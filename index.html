<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our List</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Nunito:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#fdf6ee;--warm-white:#fff9f2;--tan:#e8d5bc;--tan-dark:#c9b49a;--brown:#7a5c44;--brown-dark:#3d2b1f;--josh:#c06030;--josh-light:#f5e6db;--sarah:#7a5490;--sarah-light:#ede0f5;--green:#4a7c59;--green-light:#dff0e6;--red:#b94040;--radius:12px;--repeat-done:#c8bfb5;--rose:#c0506a;--rose-light:#f5dbe2;--gold:#b8860b;--gold-light:#fdf3d0}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--brown-dark);display:flex;flex-direction:column}
.panel{display:none;flex-direction:column;height:100vh}.panel.active{display:flex}
#login-panel{align-items:center;justify-content:center;gap:20px;padding:24px;overflow-y:auto}
.app-title{font-family:'Lora',serif;font-size:2rem;font-weight:500;text-align:center}
.app-sub{font-size:13px;color:var(--brown);font-style:italic;text-align:center;margin-top:2px}
.login-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.login-card{background:var(--warm-white);border:1.5px solid var(--tan);border-radius:var(--radius);padding:24px 28px;text-align:center;min-width:158px}
.login-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;margin:0 auto 10px;font-family:'Lora',serif}
.login-card.josh .login-avatar{background:var(--josh-light);color:var(--josh)}.login-card.sarah .login-avatar{background:var(--sarah-light);color:var(--sarah)}
.login-name{font-size:15px;font-weight:600;font-family:'Lora',serif;margin-bottom:12px}
.pin-input{width:100%;padding:8px 10px;border:1.5px solid var(--tan);border-radius:8px;font-family:'Nunito',sans-serif;font-size:15px;background:var(--cream);text-align:center;letter-spacing:4px;color:var(--brown-dark)}
.pin-input:focus{outline:none;border-color:var(--tan-dark)}
.pin-btn{margin-top:8px;width:100%;padding:8px;border:none;border-radius:8px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.login-card.josh .pin-btn{background:var(--josh);color:#fff}.login-card.sarah .pin-btn{background:var(--sarah);color:#fff}
.pin-btn:hover{opacity:.85}.pin-hint{font-size:11px;color:var(--brown);margin-top:5px}
.login-error{color:var(--red);font-size:12px;margin-top:4px;min-height:15px}
#main-panel{overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1.5px solid var(--tan);flex-shrink:0;background:var(--warm-white)}
.topbar-title{font-family:'Lora',serif;font-size:1.1rem;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:7px}
.user-badge{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;transition:opacity .2s}
.user-badge:hover{opacity:.78}.user-badge.josh{background:var(--josh-light);color:var(--josh)}.user-badge.sarah{background:var(--sarah-light);color:var(--sarah)}
.user-dot{width:8px;height:8px;border-radius:50%}.user-badge.josh .user-dot{background:var(--josh)}.user-badge.sarah .user-dot{background:var(--sarah)}
.btn-icon{background:none;border:1.5px solid var(--tan);border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px;color:var(--brown);font-family:'Nunito',sans-serif;transition:all .2s;position:relative}.btn-icon:hover{background:var(--tan)}
.notif-badge{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif}
/* Nav tabs */
.nav-tabs{display:flex;gap:0;padding:0;flex-shrink:0;border-bottom:1.5px solid var(--tan);background:var(--warm-white);overflow-x:auto}
.nav-tab{padding:8px 13px;border:none;background:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:var(--brown);transition:all .2s;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0}
.nav-tab.active{color:var(--brown-dark);border-bottom-color:var(--brown-dark)}
.nav-tab:hover:not(.active){background:#fdf0e4}
/* Sub-tabs */
.tabs-bar{display:flex;gap:8px;padding:10px 16px 0;flex-shrink:0}
.tab{padding:6px 16px;border-radius:20px;border:1.5px solid var(--tan);background:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--brown);transition:all .2s}
.tab.active{background:var(--brown-dark);color:#fff;border-color:var(--brown-dark)}
.add-bar{display:flex;gap:8px;padding:8px 16px;flex-shrink:0;border-bottom:1px solid var(--tan);flex-wrap:wrap;align-items:center}
.btn-add{padding:6px 13px;border-radius:8px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-add.primary{background:var(--brown-dark);color:#fff}.btn-add.secondary{background:none;border:1.5px solid var(--tan-dark);color:var(--brown-dark)}.btn-add:hover{opacity:.82}
/* Filter bar */
.filter-bar{display:flex;gap:6px;padding:6px 16px;flex-shrink:0;background:var(--cream);border-bottom:1px solid var(--tan);flex-wrap:wrap;align-items:center}
.filter-label{font-size:11px;color:var(--brown);font-weight:600;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.filter-select{padding:4px 8px;border:1.5px solid var(--tan);border-radius:7px;font-family:'Nunito',sans-serif;font-size:12px;background:var(--warm-white);color:var(--brown-dark);cursor:pointer}
.filter-select:focus{outline:none;border-color:var(--tan-dark)}
.filter-clear{padding:3px 8px;border:1px solid var(--tan-dark);border-radius:6px;background:none;font-family:'Nunito',sans-serif;font-size:11px;color:var(--brown);cursor:pointer;transition:all .2s}
.filter-clear:hover{background:var(--tan)}
/* Scroll area */
.scroll-area{flex:1;overflow-y:auto;padding:10px 16px}.items-list{display:flex;flex-direction:column;gap:9px}
/* Drag */
.dragging{opacity:.35;border:2px dashed var(--tan-dark)!important}.drag-over{border-top:2px solid var(--josh)!important}
/* Bucket */
.bucket-card{background:var(--warm-white);border:1.5px solid var(--tan);border-radius:var(--radius);overflow:hidden;cursor:grab}.bucket-card:active{cursor:grabbing}
.bucket-header{display:flex;align-items:center;gap:7px;padding:10px 12px;cursor:pointer;transition:background .15s;user-select:none}.bucket-header:hover{background:#fdf0e4}
.bucket-chevron{font-size:11px;color:var(--brown);transition:transform .2s;flex-shrink:0}.bucket-card.open .bucket-chevron{transform:rotate(90deg)}
.bucket-title-area{flex:1;min-width:0}.bucket-name{font-family:'Lora',serif;font-size:13px;font-weight:500}.bucket-meta{font-size:11px;color:var(--brown);margin-top:1px}
.bucket-actions{display:flex;gap:4px;flex-shrink:0}
.btn-small{background:none;border:1px solid var(--tan-dark);border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--brown-dark);transition:all .2s;white-space:nowrap}
.btn-small:hover{background:var(--tan)}.btn-small.danger:hover{background:#fbdede;border-color:var(--red);color:var(--red)}
.btn-small.snooze{border-color:var(--gold);color:var(--gold)}.btn-small.snooze:hover{background:var(--gold-light)}
.bucket-items{padding:0 12px 8px;display:flex;flex-direction:column;gap:6px}
.bucket-add-row{padding:5px 12px 8px;border-top:1px dashed var(--tan)}
.btn-bucket-add{background:none;border:1px dashed var(--tan-dark);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--brown);width:100%;transition:background .2s}.btn-bucket-add:hover{background:var(--tan)}
/* Todo */
.todo-card{background:var(--cream);border:1px solid var(--tan);border-radius:9px;overflow:hidden;cursor:grab}.todo-card:active{cursor:grabbing}
.todo-card.repeat-done{background:#f0ebe4;border-color:#d4c9bc}
.todo-row{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;transition:background .15s;user-select:none}.todo-row:hover{background:#fdf0e4}.todo-card.repeat-done .todo-row:hover{background:#ebe5dc}
.todo-check{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--tan-dark);background:var(--warm-white);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.todo-check.checked{background:var(--repeat-done);border-color:var(--repeat-done);color:#fff}.todo-check.checked.permanent{background:var(--green);border-color:var(--green)}
.todo-check-inner{font-size:10px;line-height:1}.todo-text-area{flex:1;min-width:0}
.todo-name{font-size:13px;font-weight:500}.todo-name.josh-color{color:var(--josh)}.todo-name.sarah-color{color:var(--sarah)}
.todo-name.completed{text-decoration:line-through;opacity:.45}.todo-name.repeat-greyed{color:var(--repeat-done)!important;text-decoration:line-through;opacity:.7}
.todo-deadline{font-size:11px;color:var(--brown);margin-top:1px}.todo-deadline.overdue{color:var(--red)}
.todo-right{display:flex;gap:4px;flex-shrink:0;align-items:center}
.assignee-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;white-space:nowrap}
.assignee-pill.josh{background:var(--josh-light);color:var(--josh)}.assignee-pill.sarah{background:var(--sarah-light);color:var(--sarah)}.assignee-pill.both{background:#f0eaf8;color:#6a4a80}
.private-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;background:#fff0f0;color:var(--red);white-space:nowrap}
.repeat-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;background:#ede8e0;color:var(--brown);white-space:nowrap}
.snoozed-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;background:var(--gold-light);color:var(--gold);white-space:nowrap}
.todo-expand-area{padding:0 11px 9px;border-top:1px dashed var(--tan);font-size:13px;line-height:1.6}
.detail-label{font-size:10px;color:var(--brown);font-weight:600;margin-bottom:2px;margin-top:7px;text-transform:uppercase;letter-spacing:.4px}
.todo-expand-area a{color:var(--josh)}.linked-img{max-width:100%;max-height:180px;border-radius:8px;margin-top:5px;object-fit:cover;display:block}
.completed-stamp{font-size:11px;color:var(--green);margin-top:5px;font-style:italic}.repeat-stamp{font-size:11px;color:var(--brown);margin-top:5px;font-style:italic}
/* Archive */
.archive-card{background:#f4f0eb;border:1px solid var(--tan);border-radius:9px;padding:9px 12px}
.archive-header{display:flex;align-items:flex-start;gap:8px}.archive-info{flex:1;min-width:0}
.archive-name{font-size:13px;text-decoration:line-through;color:var(--brown)}.archive-stamp{font-size:11px;color:var(--brown);margin-top:2px;font-style:italic}
.archive-todos{margin-top:8px;padding-top:6px;border-top:1px dashed var(--tan);display:flex;flex-direction:column;gap:4px}
.archive-todo-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--brown)}
.archive-todo-check{width:14px;height:14px;border-radius:4px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.archive-actions{display:flex;gap:5px;align-items:center;flex-shrink:0}
.btn-unarchive{background:none;border:1px solid var(--tan-dark);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--brown-dark);transition:all .2s}.btn-unarchive:hover{background:var(--green-light);border-color:var(--green);color:var(--green)}
.empty-state{text-align:center;padding:28px 20px;color:var(--brown);font-style:italic;font-size:13px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(61,43,31,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--warm-white);border-radius:var(--radius);padding:20px;width:100%;max-width:440px;max-height:88vh;overflow-y:auto}
.modal-title{font-family:'Lora',serif;font-size:1rem;font-weight:500;margin-bottom:14px;color:var(--brown-dark)}
.field{margin-bottom:11px}.field label{display:block;font-size:11px;font-weight:600;color:var(--brown);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field textarea,.field select{width:100%;padding:7px 10px;border:1.5px solid var(--tan);border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;background:var(--cream);color:var(--brown-dark)}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--tan-dark)}.field textarea{min-height:65px;resize:vertical}.field .hint{font-size:11px;color:var(--brown);margin-top:2px}
.repeat-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;flex-wrap:wrap}
.repeat-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--brown-dark)}.repeat-toggle input[type=checkbox]{width:16px;height:16px;accent-color:var(--brown-dark);cursor:pointer}
.repeat-days-field{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--brown)}.repeat-days-field input{width:58px;padding:5px 8px;border:1.5px solid var(--tan);border-radius:7px;font-family:'Nunito',sans-serif;font-size:13px;background:var(--cream);color:var(--brown-dark);text-align:center}
.modal-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;flex-wrap:wrap}
.btn-modal{padding:7px 16px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .2s}
.btn-modal.primary{background:var(--brown-dark);color:#fff}.btn-modal.secondary{background:none;border:1.5px solid var(--tan-dark);color:var(--brown-dark)}.btn-modal.danger{background:var(--red);color:#fff}.btn-modal.rose{background:var(--rose);color:#fff}.btn-modal:hover{opacity:.84}
.confirm-text{font-size:14px;margin-bottom:14px;line-height:1.5}.img-preview-box img{max-width:100%;max-height:110px;border-radius:8px;object-fit:cover;display:block;margin-top:5px}
/* Profile */
.profile-overlay{position:fixed;inset:0;background:rgba(61,43,31,.45);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.profile-modal{background:var(--warm-white);border-radius:var(--radius);padding:22px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto}
.profile-avatar-lg{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:600;margin:0 auto 10px;font-family:'Lora',serif}
.profile-name{font-family:'Lora',serif;font-size:1.2rem;font-weight:500;text-align:center;margin-bottom:3px}.profile-sub{font-size:12px;color:var(--brown);text-align:center;font-style:italic;margin-bottom:16px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.stat-card{background:var(--cream);border:1px solid var(--tan);border-radius:9px;padding:10px 8px;text-align:center}.stat-num{font-size:22px;font-weight:600;font-family:'Lora',serif}.stat-label{font-size:10px;color:var(--brown);margin-top:2px;line-height:1.3}
.accolades-title{font-size:11px;font-weight:600;color:var(--brown);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.accolades-list{display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto;margin-bottom:4px}
.accolade-item{display:flex;align-items:center;gap:10px;background:var(--cream);border:1px solid var(--tan);border-radius:9px;padding:8px 10px}
.accolade-icon{font-size:20px;flex-shrink:0}.accolade-text{font-size:12px;line-height:1.4}.accolade-title{font-weight:600;color:var(--brown-dark)}.accolade-desc{color:var(--brown)}
.no-accolades{font-size:13px;color:var(--brown);font-style:italic;text-align:center;padding:10px 0}
.data-section{margin-top:16px;padding-top:14px;border-top:1.5px solid var(--tan)}.data-section-title{font-size:11px;font-weight:600;color:var(--brown);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.data-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-data{padding:7px 14px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--tan-dark);background:none;color:var(--brown-dark);transition:all .2s;display:flex;align-items:center;gap:5px}.btn-data:hover{background:var(--tan)}
.btn-data.upload-btn{position:relative;overflow:hidden}.btn-data.upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
/* Confetti */
.confetti-piece{position:fixed;width:10px;height:10px;top:-10px;animation:fall linear forwards;z-index:9999;pointer-events:none;border-radius:2px}
@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ===== RECIPES TAB ===== */
.recipe-card{background:var(--warm-white);border:1.5px solid var(--tan);border-radius:var(--radius);overflow:hidden}
.recipe-header{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer;transition:background .15s;user-select:none}.recipe-header:hover{background:#fdf0e4}
.recipe-chevron{font-size:11px;color:var(--brown);transition:transform .2s;flex-shrink:0}.recipe-card.open .recipe-chevron{transform:rotate(90deg)}
.recipe-title-area{flex:1;min-width:0}.recipe-name{font-family:'Lora',serif;font-size:13px;font-weight:500}.recipe-type-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--cream);border:1px solid var(--tan);color:var(--brown);margin-top:2px}
.recipe-actions{display:flex;gap:4px;flex-shrink:0}
.recipe-body{padding:0 13px 12px;border-top:1px dashed var(--tan)}
.recipe-img{max-width:100%;max-height:200px;border-radius:8px;object-fit:cover;margin-top:10px;display:block}

/* ===== RELATIONSHIP TAB ===== */
.rel-card{background:var(--warm-white);border:1.5px solid var(--tan);border-radius:var(--radius);overflow:hidden;padding:14px}
.rel-card.love-note{border-color:var(--rose);background:var(--rose-light)}
.rel-prompt-text{font-family:'Lora',serif;font-size:13px;font-style:italic;color:var(--brown-dark);margin-bottom:10px;line-height:1.6}
.rel-date{font-size:11px;color:var(--brown);margin-bottom:10px;font-style:italic}
.rel-response-area{display:flex;flex-direction:column;gap:8px}
.rel-response-block{background:var(--cream);border:1px solid var(--tan);border-radius:8px;padding:9px 11px}
.rel-response-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.rel-response-label.josh{color:var(--josh)}.rel-response-label.sarah{color:var(--sarah)}
.rel-response-text{font-size:13px;line-height:1.5;color:var(--brown-dark)}
.rel-response-textarea{width:100%;padding:7px 10px;border:1.5px solid var(--tan);border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;background:var(--warm-white);color:var(--brown-dark);min-height:60px;resize:vertical}
.rel-response-textarea:focus{outline:none;border-color:var(--tan-dark)}
.rel-unread-dot{width:8px;height:8px;border-radius:50%;background:var(--rose);flex-shrink:0;display:inline-block;margin-left:5px}
.love-note-from{font-size:11px;font-weight:600;color:var(--rose);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.love-note-text{font-family:'Lora',serif;font-size:14px;line-height:1.7;color:var(--brown-dark)}
.rel-section-title{font-family:'Lora',serif;font-size:.95rem;font-weight:500;color:var(--brown-dark);margin:14px 0 8px}
.rel-archive-type-pill{display:inline-flex;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-bottom:4px}
.rel-archive-type-pill.prompt{background:#e8f0e8;color:var(--green)}.rel-archive-type-pill.lovenote{background:var(--rose-light);color:var(--rose)}

/* ===== NOTIFICATIONS TAB ===== */
.notif-item{background:var(--warm-white);border:1.5px solid var(--tan);border-radius:9px;padding:10px 12px;display:flex;align-items:flex-start;gap:9px}
.notif-item.unread{border-color:var(--tan-dark);background:#fffbf6}
.notif-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.notif-body{flex:1;min-width:0}.notif-msg{font-size:13px;line-height:1.4;color:var(--brown-dark)}.notif-time{font-size:11px;color:var(--brown);margin-top:2px;font-style:italic}
.notif-dismiss{background:none;border:none;font-size:14px;color:var(--brown);cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1}
.notif-dismiss:hover{color:var(--red)}

<script>
// ===================== CONSTANTS =====================
async function hashPin(pin){const enc=new TextEncoder().encode(pin);const buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
const PINS={josh:'b21ca77b6575f5be955715b6f6aa02b04786e139da733f3d78fc4c72009b4afb',sarah:'346e70cff22884ed701572ba3fd49b77020662c8db775a1160d3a8e2cedeecc2'};
const STORAGE_KEY='ourlist-v6';
const SUPABASE_URL='https://ccfetfniolxzacsdxmyn.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_I2lY6zpxLYvn3qyebksRcg_vRPH8xfy';
currentUser=null,currentTab='active',currentMainTab='todos',currentRecipeTab='all',currentRelTab='active',dragSrc=null;

// Gottman prompts pool
const GOTTMAN_PROMPTS=[
"What is something you've been thinking about a lot lately?","What's stressing you out right now?","What's one goal you have this year?","Who has influenced you most in your life recently?","What's a recent memory that stuck with you?","What do you look forward to most each week?","What's something new you've learned about yourself?","What's one thing you wish people understood about you?","What's your current biggest worry?","What's something small that made you happy today?",
"What's something I do that makes you feel appreciated?","What's one quality of mine you admire?","When did you last feel proud of us?","What's a favorite memory of us?","What's something I've done that made your life easier?","What drew you to me originally?","What's something I do that you don't say thank you for enough?","What's one way I've grown that you've noticed?","What makes you feel lucky to be with me?","What's something about me you've been appreciating lately?",
"When do you feel most connected to me?","What helps you feel supported when you're overwhelmed?","What's one small way I could show up for you more?","When do you feel like I really listen to you?","What does emotional support look like for you?","When do you feel most distant from me?","What's one thing I do that makes you feel seen?","How do you like to receive comfort?","What's one way we could connect more during busy days?","When do you feel most valued by me?",
"How do you usually feel during conflict?","What helps you calm down when you're upset?","What's a trigger for you that I might not notice?","How can I approach difficult topics better?","What does a good apology look like to you?","What's something I do during conflict that doesn't help?","What's one thing we do well when resolving disagreements?","How can we repair things faster after a fight?","What's something you need more of during conflict?","What's something you need less of during conflict?",
"What's a dream you've had for a long time?","What does success look like to you?","What kind of life do you want in 5 years?","What motivates you to keep going during hard times?","What values matter most to you right now?","What's something meaningful you want us to build together?","What legacy do you want to leave?","What's a dream you haven't shared with many people?","What excites you about the future?","What kind of partner do you want to be?",
"What part of your day do you enjoy the most?","What part of your day drains you?","What's one habit you want to build?","What's something we could do to improve our routine?","How do you like to start your mornings?","What helps you unwind at night?","What's something we could do to reduce stress at home?","What's one responsibility you wish felt easier?","How do you prefer to plan your time?","What's something we could simplify in our lives?",
"What makes you feel closest to me physically?","What kind of affection do you enjoy most?","When do you feel most desired?","What's something small I do that makes you feel loved?","What's one way we could improve intimacy?","How do you like to express love?","What helps you feel safe in our relationship?","What's something that makes you feel emotionally close?","When do you feel most relaxed with me?","What does romance mean to you?",
"What's something you're grateful for about us?","What's something I did recently that meant a lot?","What's something you appreciate about our life together?","What's something I do that you don't want me to stop?","What's something small we do well as a couple?","What's something we've overcome that you're proud of?","What's something you admire about how we handle challenges?","What's something I've supported you through?","What's something you're thankful for today?","What's something we take for granted?",
"How have you changed in the past year?","How have we changed as a couple?","What's something you're working on personally?","What's one way I can support your growth?","What's something we could improve together?","What's a challenge you want to face as a team?","What's something you've learned from our relationship?","What's something you'd like to do differently going forward?","What helps you feel encouraged?","What's something you want more of in our relationship?",
"What's something fun you want to do together soon?","What makes you laugh the most?","What's a favorite way we spend time together?","What's something new you want to try as a couple?","What's your idea of a perfect day together?","What's a spontaneous thing we could do this week?","What's something playful we've done that you loved?","What helps you feel lighthearted?","What's a shared hobby we could explore?","What's one way we could bring more joy into our relationship?"
];

let STATE={
  items:[],archive:[],accolades:{josh:[],sarah:[]},
  recipes:[],
  relationship:{active:[],archive:[]},
  promptsUsed:[],
  wishlist:[],
  notifications:[]
};

// ===================== PERSISTENCE =====================
async function loadState(){
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/ourlist_state?id=eq.shared&select=state',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}});
    const rows=await res.json();
    if(rows&&rows[0]&&rows[0].state){
      const s=rows[0].state;
      if(!s.recipes)s.recipes=[];
      if(!s.relationship)s.relationship={active:[],archive:[]};
      if(!s.promptsUsed)s.promptsUsed=[];
      if(!s.wishlist)s.wishlist=[];
      if(!s.notifications)s.notifications=[];
      return s;
    }
  }catch(e){console.error('Load failed',e);}
  return{items:[],archive:[],accolades:{josh:[],sarah:[]},recipes:[],relationship:{active:[],archive:[]},promptsUsed:[],wishlist:[],notifications:[]};
}
async function saveState(){
  try{
    await fetch(SUPABASE_URL+'/rest/v1/ourlist_state?id=eq.shared',{method:'PATCH',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({state:STATE,updated_at:new Date().toISOString()})});
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(STATE));}catch(e){}
  }catch(e){console.error('Save failed',e);}
}

// ===================== HELPERS =====================
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmtDate(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function isOverdue(d){if(!d)return false;return new Date(d+'T00:00:00')<new Date(new Date().toDateString());}
function fmtNow(){return new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});}
function today(){return new Date().toDateString();}
function thisWeekStart(){const d=new Date();d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);return d.getTime();}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function otherUser(){return currentUser==='josh'?'sarah':'josh';}
function displayName(u){return u==='josh'?'Josh':'Sarah';}
function isRepeatGreyed(t){if(!t.repeat||!t.repeatDays||!t.repeatDoneAt)return false;return Date.now()<new Date(t.repeatDoneAt).getTime()+(t.repeatDays*86400000);}
function assigneeLabel(a){if(!a||a==='both')return'<span class="assignee-pill both">Both</span>';return'<span class="assignee-pill '+a+'">'+displayName(a)+'</span>';}
function nameColor(assignee,creator){return((assignee&&assignee!=='both'?assignee:creator)==='josh')?'josh-color':'sarah-color';}
function showPanel(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function starsHTML(n){let h='';for(let i=1;i<=5;i++)h+=(i<=n)?'&#9733;':'&#9734;';return h;}

// ===================== NOTIFICATIONS =====================
function addNotification(type,msg){
  if(!STATE.notifications)STATE.notifications=[];
  STATE.notifications.unshift({id:uid(),type,msg,time:fmtNow(),read:false,for:otherUser()});
  saveState();
  updateNotifBadge();
}
function updateNotifBadge(){
  if(!STATE.notifications)return;
  const unread=STATE.notifications.filter(n=>!n.read).length;
  const badge=document.getElementById('notif-badge');
  if(badge){badge.style.display=unread>0?'flex':'none';badge.textContent=unread>9?'9+':unread;}
}
function dismissNotif(id){STATE.notifications=STATE.notifications.filter(n=>n.id!==id);saveState();renderNotifications();updateNotifBadge();}
function clearAllNotifs(){STATE.notifications=[];saveState();renderNotifications();updateNotifBadge();}
function renderNotifications(){
  const el=document.getElementById('notif-list');
  if(!el)return;
  // Mark all as read
  (STATE.notifications||[]).forEach(n=>n.read=true);
  saveState();
  updateNotifBadge();
  if(!STATE.notifications||!STATE.notifications.length){el.innerHTML='<div class="empty-state">No notifications yet.</div>';return;}
  const icons={todo:'&#9989;',bucket:'&#129524;',prompt:'&#10024;',lovenote:'&#128140;',recipe:'&#127859;',wish:'&#127873;'};
  el.innerHTML=(STATE.notifications||[]).filter(n=>!n.for||n.for===currentUser).map(n=>'<div class="notif-item"><div class="notif-icon">'+(icons[n.type]||'&#128276;')+'</div><div class="notif-body"><div class="notif-msg">'+esc(n.msg)+'</div><div class="notif-time">'+esc(n.time)+'</div></div><button class="notif-dismiss" onclick="dismissNotif(\''+n.id+'\')" title="Dismiss">&#10005;</button></div>').join('');
}

// ===================== LOGIN / LOGOUT =====================
async function doLogin(user){
  const pin=document.getElementById('pin-'+user).value,err=document.getElementById('err-'+user);
  if(!pin){err.textContent='Please enter your PIN';return;}
  try{
    const hashed=await hashPin(pin);
    if(hashed!==PINS[user]){err.textContent='Incorrect PIN';return;}
  }catch(e){
    err.textContent='Login error: '+e.message;return;
  }
  err.textContent='';
  currentUser=user;
  STATE=await loadState();
  if(!STATE.accolades)STATE.accolades={josh:[],sarah:[]};
  document.getElementById('user-badge').className='user-badge '+user;
  document.getElementById('user-label').textContent=displayName(user);
  showPanel('main-panel');
  tickRepeats();
  updateNotifBadge();
  switchMainTab('todos');
}
function doLogout(){currentUser=null;document.getElementById('pin-josh').value='';document.getElementById('pin-sarah').value='';showPanel('login-panel');}

// ===================== MAIN TAB SWITCHER =====================
function switchMainTab(tab){
  currentMainTab=tab;
  ['todos','recipes','relationship','wishlist','notifications'].forEach(t=>{
    document.getElementById('section-'+t).style.display=t===tab?'flex':'none';
    const nb=document.getElementById('navtab-'+t);
    if(nb)nb.classList.toggle('active',t===tab);
  });
  if(tab==='todos'){switchTab(currentTab);}
  else if(tab==='recipes'){renderRecipes();}
  else if(tab==='relationship'){renderRelationship();}
  else if(tab==='wishlist'){renderWishlist();}
  else if(tab==='notifications'){renderNotifications();}
}

// ===================== TO-DOS =====================
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-active').classList.toggle('active',tab==='active');
  document.getElementById('tab-archive').classList.toggle('active',tab==='archive');
  document.getElementById('add-bar').style.display=tab==='active'?'flex':'none';
  document.getElementById('filter-bar').style.display=tab==='active'?'flex':'none';
  if(tab==='active')renderItems();else renderArchive();
}

// Filters
function applyFilters(){renderItems();}
function clearFilters(){document.getElementById('filter-tab').value='';document.getElementById('filter-user').value='';renderItems();}
function getFilters(){return{type:document.getElementById('filter-tab').value,user:document.getElementById('filter-user').value};}

function isPrivateHidden(item){
  if(!item.private)return false;
  return item.creator!==currentUser;
}

function renderItems(){
  const el=document.getElementById('items-list');
  const{type,user}=getFilters();
  let active=STATE.items.filter(i=>!i.archived);
  // Hide private items from other user
  active=active.filter(i=>!isPrivateHidden(i));
  // Apply type filter
  if(type)active=active.filter(i=>i.type===type);
  // Apply user filter
  if(user)active=active.filter(i=>{
    if(i.type==='bucket')return i.assignee===user||i.assignee==='both';
    return i.assignee===user||i.assignee==='both';
  });
  const sort=document.getElementById('filter-sort')?.value||'';
  if(sort==='due-asc')active.sort((a,b)=>{if(!a.deadline&&!b.deadline)return 0;if(!a.deadline)return 1;if(!b.deadline)return-1;return a.deadline<b.deadline?-1:1;});
  else if(sort==='due-desc')active.sort((a,b)=>{if(!a.deadline&&!b.deadline)return 0;if(!a.deadline)return 1;if(!b.deadline)return-1;return a.deadline>b.deadline?-1:1;});
  else if(sort==='overdue')active.sort((a,b)=>{const ao=isOverdue(a.deadline)&&!a.completed,bo=isOverdue(b.deadline)&&!b.completed;if(ao&&!bo)return-1;if(!ao&&bo)return 1;return 0;});
  if(!active.length){el.innerHTML='<div class="empty-state">Nothing on the list yet!</div>';return;}
  el.innerHTML=active.map(i=>i.type==='bucket'?renderBucket(i):renderTodo(i,false,'')).join('');
  addDragListeners();
}

function renderBucket(b){
  const todos=b.todos||[],done=todos.filter(t=>t.completed||isRepeatGreyed(t)).length,pct=todos.length?Math.round(done/todos.length*100):0,dl=b.deadline?' · Due '+fmtDate(b.deadline):'',nc=nameColor(b.assignee,b.creator);
  const privPill=b.private?'<span class="private-pill">&#128274; Private</span>':'';
  return'<div class="bucket-card'+(b.expanded?' open':'')+'" id="bkt-'+b.id+'" draggable="true" data-id="'+b.id+'" data-type="bucket"><div class="bucket-header" onclick="toggleBucket(\''+b.id+'\')"><span class="bucket-chevron">&#9654;</span><div class="bucket-title-area"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span class="bucket-name '+nc+'">'+esc(b.name)+'</span>'+assigneeLabel(b.assignee)+privPill+'</div><div class="bucket-meta">'+todos.length+' item'+(todos.length!==1?'s':'')+' · '+pct+'% done'+dl+'</div></div><div class="bucket-actions" onclick="event.stopPropagation()"><button class="btn-small" onclick="completeBucket(\''+b.id+'\')">&#10003; Done</button><button class="btn-small" onclick="openModal(\'editbucket\',\''+b.id+'\')">Edit</button><button class="btn-small danger" onclick="confirmDelete(\'bucket\',\''+b.id+'\',\'\')">Del</button></div></div>'+(b.expanded?'<div class="bucket-items">'+todos.map(t=>renderTodo(t,true,b.id)).join('')+(todos.length===0?'<div style="font-size:12px;color:var(--brown);font-style:italic;padding:3px 0">No items yet</div>':'')+'</div><div class="bucket-add-row"><button class="btn-bucket-add" onclick="openModal(\'todo\',\''+b.id+'\')">+ Add item to this bucket</button></div>':'')+'</div>';
}

function renderTodo(t,inBucket,bucketId){
  const g=isRepeatGreyed(t),nc=nameColor(t.assignee,t.creator),ov=isOverdue(t.deadline)&&!t.completed&&!g?' overdue':'',dl=t.deadline?'Due '+fmtDate(t.deadline):'',bid=bucketId||'',drag=!inBucket?' draggable="true" data-id="'+t.id+'" data-type="todo"':'',cc='todo-card'+(g?' repeat-done':''),tn='todo-name '+nc+(g?' repeat-greyed':t.completed?' completed':''),ch='todo-check'+(g||t.completed?' checked':'')+(!t.repeat&&t.completed?' permanent':''),rp=t.repeat?'<span class="repeat-pill">&#8635; '+t.repeatDays+'d</span>':'';
  const calBtn=(t.deadline&&!t.completed)?'<button class="btn-small" onclick="exportICS(\''+t.id+'\',\''+bid+'\')">&#128197;</button>':'';
  const snzBtn=(t.deadline&&!t.completed&&!g)?'<button class="btn-small snooze" onclick="event.stopPropagation();openSnooze(\''+t.id+'\',\''+bid+'\')">&#128164;</button>':'';
  const privPill=t.private?'<span class="private-pill">&#128274; Private</span>':'';
  return'<div class="'+cc+'" id="todo-'+t.id+'"'+drag+'><div class="todo-row" onclick="toggleExpand(\''+t.id+'\',\''+bid+'\')"><div class="'+ch+'" onclick="event.stopPropagation();completeTodo(\''+t.id+'\',\''+bid+'\')">'+(g||t.completed?'<span class="todo-check-inner">&#10003;</span>':'')+'</div><div class="todo-text-area"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span class="'+tn+'">'+esc(t.name)+'</span>'+assigneeLabel(t.assignee)+rp+privPill+'</div>'+(dl?'<div class="todo-deadline'+ov+'">'+dl+'</div>':'')+'</div><div class="todo-right" onclick="event.stopPropagation()">'+calBtn+snzBtn+'<button class="btn-small" onclick="openModal(\'edittodo\',\''+t.id+'\',\''+bid+'\')">Edit</button><button class="btn-small danger" onclick="confirmDelete(\'todo\',\''+t.id+'\',\''+bid+'\')">Del</button></div></div>'+(t.expanded?renderDetail(t,g):'')+'</div>';
}

function renderDetail(t,g){
  let h='<div class="todo-expand-area">';
  if(t.notes)h+='<div class="detail-label">Notes</div><div>'+esc(t.notes).replace(/\n/g,'<br>')+'</div>';
  if(t.link)h+='<div class="detail-label">Link</div><a href="'+esc(t.link)+'" target="_blank">'+esc(t.link)+'</a>';
  if(t.imgUrl)h+='<div class="detail-label">Photo</div><img src="'+esc(t.imgUrl)+'" class="linked-img" onerror="this.style.display=\'none\'">';
  if(g&&t.repeatDoneAt){const ms=new Date(t.repeatDoneAt).getTime()+(t.repeatDays*86400000),diff=Math.max(0,Math.ceil((ms-Date.now())/3600000));h+='<div class="repeat-stamp">Resets in '+Math.floor(diff/24)+'d '+diff%24+'h</div>';}
  else if(!t.repeat&&t.completed&&t.completedBy)h+='<div class="completed-stamp">Completed by '+esc(t.completedBy)+' on '+esc(t.completedAt)+'</div>';
  h+='</div>';return h;
}

function renderArchive(){
  const el=document.getElementById('items-list');
  if(!STATE.archive.length){el.innerHTML='<div class="empty-state">Nothing archived yet.</div>';return;}
  el.innerHTML=[...STATE.archive].reverse().map(a=>{let inner='<div class="archive-header"><div class="archive-info"><div class="archive-name">'+esc(a.name)+(a.type==='bucket'?' (bucket)':'')+'</div><div class="archive-stamp">Completed by '+esc(a.completedBy)+' &middot; '+esc(a.completedAt)+'</div></div><div class="archive-actions"><button class="btn-unarchive" onclick="unarchive(\''+a.id+'\')">&#8617; Restore</button></div></div>';if(a.type==='bucket'&&a.original&&(a.original.todos||[]).length)inner+='<div class="archive-todos">'+(a.original.todos||[]).map(t=>'<div class="archive-todo-item"><div class="archive-todo-check">&#10003;</div><span>'+esc(t.name)+'</span></div>').join('')+'</div>';return'<div class="archive-card">'+inner+'</div>';}).join('');
}

// Drag
function addDragListeners(){
  document.querySelectorAll('[draggable="true"]').forEach(el=>{
    el.addEventListener('dragstart',function(e){dragSrc=this;e.dataTransfer.effectAllowed='move';setTimeout(()=>this.classList.add('dragging'),0);});
    el.addEventListener('dragover',function(e){e.preventDefault();if(this!==dragSrc)this.classList.add('drag-over');});
    el.addEventListener('dragleave',function(){this.classList.remove('drag-over');});
    el.addEventListener('drop',function(e){e.preventDefault();this.classList.remove('drag-over');if(!dragSrc||dragSrc===this)return;const sId=dragSrc.dataset.id,dId=this.dataset.id,gS=STATE.items.findIndex(i=>i.id===sId),gD=STATE.items.findIndex(i=>i.id===dId);if(gS===-1||gD===-1)return;const[m]=STATE.items.splice(gS,1);STATE.items.splice(STATE.items.findIndex(i=>i.id===dId)+(gS<gD?1:0),0,m);saveState();renderItems();});
    el.addEventListener('dragend',function(){this.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(e=>e.classList.remove('drag-over'));dragSrc=null;});
  });
}

function findTodo(id,bid){if(bid){const b=STATE.items.find(i=>i.id===bid);return b?(b.todos||[]).find(t=>t.id===id):null;}return STATE.items.find(i=>i.id===id&&i.type==='todo');}
function toggleBucket(id){const b=STATE.items.find(i=>i.id===id);if(b)b.expanded=!b.expanded;saveState();renderItems();}
function toggleExpand(id,bid){const t=findTodo(id,bid);if(t)t.expanded=!t.expanded;saveState();renderItems();}

function completeTodo(id,bid){
  const t=findTodo(id,bid);if(!t||isRepeatGreyed(t))return;
  t.completed=true;t.completedBy=displayName(currentUser);t.completedAt=fmtNow();t.completedDate=today();
  if(t.repeat){t.repeatDoneAt=new Date().toISOString();t.expanded=true;saveState();checkAwardAccolades(currentUser);renderItems();}
  else{t.expanded=true;if(!bid){STATE.archive.push({type:'todo',id:t.id,name:t.name,completedBy:t.completedBy,completedAt:t.completedAt,completedDate:t.completedDate,original:JSON.parse(JSON.stringify(t))});STATE.items=STATE.items.filter(i=>i.id!==id);}saveState();checkAwardAccolades(currentUser);renderItems();}
}
function completeBucket(bid){
  const b=STATE.items.find(i=>i.id===bid);if(!b)return;
  if((b.todos||[]).length&&!(b.todos||[]).every(t=>t.completed||isRepeatGreyed(t))){alert('Please complete all items in this bucket first!');return;}
  STATE.archive.push({type:'bucket',id:b.id,name:b.name,completedBy:displayName(currentUser),completedAt:fmtNow(),completedDate:today(),original:JSON.parse(JSON.stringify(b))});
  STATE.items=STATE.items.filter(i=>i.id!==bid);saveState();confetti(60);checkAwardAccolades(currentUser);renderItems();
}
function unarchive(id){
  const idx=STATE.archive.findIndex(a=>a.id===id);if(idx===-1)return;
  const a=STATE.archive.splice(idx,1)[0];
  if(a.original){const o=a.original;o.completed=false;o.completedBy=null;o.completedAt=null;o.repeatDoneAt=null;o.expanded=false;if(o.type==='bucket')(o.todos||[]).forEach(t=>{t.completed=false;t.completedBy=null;t.completedAt=null;t.repeatDoneAt=null;t.completedDate=null;});STATE.items.push(o);}
  else{STATE.items.push({id:a.id,type:a.type==='bucket'?'bucket':'todo',name:a.name,creator:currentUser,assignee:'both',completed:false,expanded:false,todos:[]});}
  saveState();renderArchive();
}
function confirmDelete(type,id,bid){
  const name=type==='bucket'?(STATE.items.find(i=>i.id===id)||{}).name:(findTodo(id,bid)||{}).name;
  showModal('<div class="modal-title">Delete this item?</div><div class="confirm-text">Permanently delete <strong>'+esc(name||'this item')+'</strong>?</div><div class="modal-actions"><button class="btn-modal secondary" onclick="closeModal()">Cancel</button><button class="btn-modal danger" onclick="doDelete(\''+type+'\',\''+id+'\',\''+bid+'\')">Delete</button></div>');
}
function doDelete(type,id,bid){
  if(type==='bucket')STATE.items=STATE.items.filter(i=>i.id!==id);
  else if(bid){const b=STATE.items.find(i=>i.id===bid);if(b)b.todos=(b.todos||[]).filter(t=>t.id!==id);}
  else STATE.items=STATE.items.filter(i=>i.id!==id);
  saveState();closeModal();if(currentTab==='active')renderItems();else renderArchive();
}
function tickRepeats(){let c=false;STATE.items.forEach(i=>{if(i.type==='todo'&&i.repeat&&i.repeatDoneAt&&!isRepeatGreyed(i)){i.repeatDoneAt=null;i.completed=false;c=true;}if(i.type==='bucket')(i.todos||[]).forEach(t=>{if(t.repeat&&t.repeatDoneAt&&!isRepeatGreyed(t)){t.repeatDoneAt=null;t.completed=false;c=true;}});});if(c)saveState();}

function assigneeOptions(c){
  return[{val:currentUser,label:'Me ('+displayName(currentUser)+')'},{val:otherUser(),label:displayName(otherUser())},{val:'both',label:'Both of us'}].map(o=>'<option value="'+o.val+'"'+((c||currentUser)===o.val?' selected':'')+'>'+o.label+'</option>').join('');
}
function repeatFields(t){const on=t&&t.repeat,days=t&&t.repeatDays?t.repeatDays:7;return'<div class="repeat-row"><label class="repeat-toggle"><input type="checkbox" id="f-repeat"'+(on?' checked':'')+' onchange="toggleRepeatField()"> Repeatable</label><div class="repeat-days-field" id="repeat-days-wrap" style="'+(on?'':'display:none')+'">Reset after <input type="number" id="f-repeat-days" min="1" max="365" value="'+days+'"> days</div></div>';}

function openModal(type,arg1,arg2){
  if(type==='todo'){

  }else if(type==='bucket'){
    showModal('<div class="modal-title">New Bucket</div><div class="field"><label>Bucket name *</label><input id="f-name" type="text" placeholder="e.g. Home Projects"></div><div class="field"><label>Assigned to</label><select id="f-assignee">'+assigneeOptions(currentUser)+'</select></div><div class="field"><label>Deadline (optional)</label><input id="f-deadline" type="date"></div><div class="repeat-row"><label class="repeat-toggle"><input type="checkbox" id="f-private"> Private (only I can see this)</label></div><div class="modal-actions"><button class="btn-modal secondary" onclick="closeModal()">Cancel</button><button class="btn-modal primary" onclick="saveBucket()">Create</button></div>');

  }else if(type==='editbucket'){
    const b=STATE.items.find(i=>i.id===arg1);if(!b)return;

function previewImg(url){const box=document.getElementById('img-prev-box');if(!box)return;box.innerHTML=url?'<img src="'+esc(url)+'" onerror="this.style.display=\'none\'">':'';}
function saveTodo(bid){
  const name=document.getElementById('f-name').value.trim();if(!name){alert('Please enter a name.');return;}
  const rv=getRepeatVals(),isPrivate=document.getElementById('f-private')&&document.getElementById('f-private').checked;
  const assignee=document.getElementById('f-assignee').value;
  const t={id:uid(),type:'todo',name,assignee,repeat:rv.repeat,repeatDays:rv.repeatDays,repeatDoneAt:null,deadline:document.getElementById('f-deadline').value||null,notes:document.getElementById('f-notes').value.trim()||null,link:document.getElementById('f-link').value.trim()||null,imgUrl:document.getElementById('f-imgurl').value.trim()||null,creator:currentUser,completed:false,expanded:false,private:isPrivate||false};
  if(bid&&STATE.items.find(i=>i.id===bid)){const b=STATE.items.find(i=>i.id===bid);b.todos=b.todos||[];b.todos.push(t);}
  else STATE.items.push(t);
  // Notify if assigning to other user
  if(assignee===otherUser()||assignee==='both'){addNotification('todo',displayName(currentUser)+' assigned you a to-do: "'+name+'"');}
  saveState();closeModal();renderItems();
}
function updateTodo(id,bid){
  const t=findTodo(id,bid);if(!t)return;
  const name=document.getElementById('f-name').value.trim();if(!name){alert('Please enter a name.');return;}
  const rv=getRepeatVals(),isPrivate=document.getElementById('f-private')&&document.getElementById('f-private').checked;
  const assignee=document.getElementById('f-assignee').value;
  Object.assign(t,{name,assignee,repeat:rv.repeat,repeatDays:rv.repeatDays,deadline:document.getElementById('f-deadline').value||null,notes:document.getElementById('f-notes').value.trim()||null,link:document.getElementById('f-link').value.trim()||null,imgUrl:document.getElementById('f-imgurl').value.trim()||null,private:isPrivate||false});
  if(!rv.repeat){t.repeatDoneAt=null;t.completed=false;}
  saveState();closeModal();renderItems();
}
function saveBucket(){
  const name=document.getElementById('f-name').value.trim();if(!name){alert('Please enter a name.');return;}
  const assignee=document.getElementById('f-assignee').value;
  const isPrivate=document.getElementById('f-private')&&document.getElementById('f-private').checked;
  STATE.items.push({id:uid(),type:'bucket',name,assignee,deadline:document.getElementById('f-deadline').value||null,creator:currentUser,todos:[],expanded:true,private:isPrivate||false});
  saveState();closeModal();renderItems();
}
function updateBucket(id){
  const b=STATE.items.find(i=>i.id===id);if(!b)return;
  const name=document.getElementById('f-name').value.trim();if(!name){alert('Please enter a name.');return;}
  const isPrivate=document.getElementById('f-private')&&document.getElementById('f-private').checked;
  b.name=name;b.assignee=document.getElementById('f-assignee').value;b.deadline=document.getElementById('f-deadline').value||null;b.private=isPrivate||false;

currentRecipeTab='all';

currentRelTab='active';
function switchRelTab(tab){
  currentRelTab=tab;
  document.getElementById('reltab-active').classList.toggle('active',tab==='active');
  document.getElementById('reltab-archive').classList.toggle('active',tab==='archive');
  renderRelationship();

function getNextPrompt(){
  if(!STATE.promptsUsed)STATE.promptsUsed=[];
  const all=GOTTMAN_PROMPTS;
  let unused=all.filter((_,i)=>!STATE.promptsUsed.includes(i));
  if(!unused.length){STATE.promptsUsed=[];unused=all;}
  const idx=Math.floor(Math.random()*unused.length);
  const globalIdx=all.indexOf(unused[idx]);
  STATE.promptsUsed.push(globalIdx);
  return all[globalIdx];
}
function openPromptModal(){
  showModal('<div class="modal-title">&#10024; New Prompt</div><div class="field"><label>How would you like to create this prompt?</label></div><div class="modal-actions" style="justify-content:center;flex-direction:column;gap:10px"><button class="btn-modal primary" style="width:100%" onclick="generatePrompt()">&#127922; Generate one for me</button><button class="btn-modal secondary" style="width:100%" onclick="openCreatePromptModal()">&#9999;&#65039; Write my own</button><button class="btn-modal secondary" onclick="closeModal()">Cancel</button></div>');

function openLoveNoteModal(){

}
function sendLoveNote(){

function renderRelationship(){
  const el=document.getElementById('rel-list');if(!el)return;
  if(!STATE.relationship)STATE.relationship={active:[],archive:[]};
  if(currentRelTab==='active'){
    const items=STATE.relationship.active||[];

    el.innerHTML=items.map(item=>item.type==='lovenote'?renderLoveNote(item,false):renderPromptCard(item,false)).join('');
  }else{
    const items=STATE.relationship.archive||[];
    if(!items.length){el.innerHTML='<div class="empty-state">No archived relationship items yet.</div>';return;}
    // Archive filter
    let filterHTML='<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap"><button class="tab active" id="relf-all" onclick="filterRelArchive(\'all\')">All</button><button class="tab" id="relf-prompts" onclick="filterRelArchive(\'prompt\')">Prompts</button><button class="tab" id="relf-notes" onclick="filterRelArchive(\'lovenote\')">Love Notes</button><button class="tab" id="relf-sent" onclick="filterRelArchive(\'sent\')">Sent by me</button><button class="tab" id="relf-recv" onclick="filterRelArchive(\'received\')">Received</button></div>';
    el.innerHTML=filterHTML+'<div id="rel-archive-inner">'+items.map(item=>item.type==='lovenote'?renderLoveNote(item,true):renderPromptCard(item,true)).join('')+'</div>';
  }

let relArchiveFilter='all';
function filterRelArchive(f){
  relArchiveFilter=f;
  ['all','prompt','lovenote','sent','received'].forEach(x=>{const el=document.getElementById('relf-'+x);if(el)el.classList.toggle('active',x===f);});
  const el=document.getElementById('rel-archive-inner');if(!el)return;
  let items=STATE.relationship.archive||[];
  if(f==='prompt')items=items.filter(i=>i.type==='prompt');
  else if(f==='lovenote')items=items.filter(i=>i.type==='lovenote');
  else if(f==='sent')items=items.filter(i=>i.type==='lovenote'&&i.from===currentUser);
  else if(f==='received')items=items.filter(i=>i.type==='lovenote'&&i.to===currentUser);
  el.innerHTML=items.map(item=>item.type==='lovenote'?renderLoveNote(item,true):renderPromptCard(item,true)).join('')||'<div class="empty-state">No items match this filter.</div>';
}
function renderPromptCard(item,archived){
  const myKey=currentUser+'Write';const otherKey=otherUser()+'Write';
  const myRead=currentUser==='josh'?item.joshRead:item.sarahRead;
  const otherRead=currentUser==='josh'?item.sarahRead:item.joshRead;
  const myResponse=item[myKey]||'';const otherResponse=item[otherKey]||'';
  const typePill=archived?'<span class="rel-archive-type-pill prompt">Prompt</span><br>':'';
  let h='<div class="rel-card">'+typePill+'<div class="rel-date">&#10024; '+esc(item.createdAt)+'</div><div class="rel-prompt-text">'+esc(item.prompt)+'</div><div class="rel-response-area">';
  // My response block
  h+='<div class="rel-response-block"><div class="rel-response-label '+currentUser+'">'+displayName(currentUser)+'\'s response</div>';
  if(archived||myResponse){
    h+='<div class="rel-response-text">'+(myResponse?esc(myResponse):'<em style="color:var(--brown);font-size:12px">No response written</em>')+'</div>';
  }else{
    h+='<textarea class="rel-response-textarea" id="resp-'+item.id+'-my" placeholder="Write your response...">'+(myResponse||'')+'</textarea><div style="display:flex;gap:6px;margin-top:5px"><button class="btn-small" onclick="saveRelResponse(\''+item.id+'\')">Save</button>';
    if(!myRead)h+='<button class="btn-small" onclick="markRelRead(\''+item.id+'\',\''+currentUser+'\')">Read &#10003;</button>';
    h+='</div>';
  }
  if(!archived&&!myRead&&myResponse)h+='<button class="btn-small" style="margin-top:5px" onclick="markRelRead(\''+item.id+'\',\''+currentUser+'\')">Mark as Read &#10003;</button>';
  h+='</div>';
  // Other user's response
  h+='<div class="rel-response-block"><div class="rel-response-label '+otherUser()+'">'+displayName(otherUser())+'\'s response</div>';
  if(!myRead&&otherResponse){h+='<div class="rel-response-text" style="filter:blur(4px);user-select:none">'+esc(otherResponse)+'</div><div style="font-size:11px;color:var(--brown);font-style:italic">Read your own response first to reveal.</div>';}
  else if(otherResponse){h+='<div class="rel-response-text">'+esc(otherResponse)+'</div>';}
  else{h+='<div class="rel-response-text"><em style="color:var(--brown);font-size:12px">Waiting for '+displayName(otherUser())+'...</em></div>';}
  h+='</div>';
  h+='</div>';
  if(!archived){
    const bothRead=item.joshRead&&item.sarahRead&&item.joshWrite&&item.sarahWrite;
    if(bothRead)h+='<div style="margin-top:8px"><button class="btn-small" onclick="archiveRelItem(\''+item.id+'\')">Archive &#8594;</button></div>';
  }
  if(archived){h+='<div style="margin-top:8px"><button class="btn-small" style="border-color:var(--red);color:var(--red)" onclick="deleteRelItem(\''+item.id+'\',\'prompt\')">Delete &#10005;</button></div>';}
  h+='</div>';return h;
}
function renderLoveNote(item,archived){
  const isFromMe=item.from===currentUser;
  const isForMe=item.to===currentUser;
  const readKey=isFromMe?'fromRead':'toRead';
  const unread=isForMe&&!item[readKey];
  const typePill=archived?'<span class="rel-archive-type-pill lovenote">Love Note</span><br>':'';
  let h='<div class="rel-card love-note">'+typePill+'<div class="love-note-from">&#128140; From '+displayName(item.from)+' · '+esc(item.createdAt)+(unread?'<span class="rel-unread-dot"></span>':'')+'</div>';
  if(isFromMe||item.fromRead||item.toRead){
    h+='<div class="love-note-text">'+esc(item.text).replace(/\n/g,'<br>')+'</div>';
  }else{
    h+='<div class="love-note-text" style="filter:blur(5px);user-select:none">'+esc(item.text)+'</div><button class="btn-small" style="margin-top:8px" onclick="readLoveNote(\''+item.id+'\')">&#128140; Read Note</button>';
  }
    if(archived){h+='<div style="margin-top:10px"><button class="btn-small" style="border-color:var(--red);color:var(--red)" onclick="deleteRelItem(\''+item.id+'\',\'lovenote\')">Delete &#10005;</button></div>';}if(!archived){h+='<div style="margin-top:10px;display:flex;gap:6px"><button class="btn-small" onclick="archiveRelItem(\''+item.id+'\')">Archive &#8594;</button></div>';}
  h+='</div>';return h;
}

}
function addReminderToCalendar(name,date){
  if(!date)return;
  const d=date.replace(/-/g,'');
  const title=encodeURIComponent('Reminder: '+name);
  const url='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+title+'&dates='+d+'/'+d;
  window.open(url,'_blank');
function addBirthdayToCalendar(name,date){
  if(!date)return;
  const d=date.replace(/-/g,'');
  const title=encodeURIComponent(name+"'s Birthday");
  const url='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+title+'&dates='+d+'/'+d+'&recur=RRULE:FREQ=YEARLY';
  window.open(url,'_blank');
}

// ===================== PROFILE & STATS =====================
function openProfile(user){
  const name=displayName(user),stats=getUserStats(user),accolades=(STATE.accolades&&STATE.accolades[user])||[],other=user==='josh'?'sarah':'josh',bg=user==='josh'?'var(--josh-light)':'var(--sarah-light)',ac=user==='josh'?'var(--josh)':'var(--sarah)';
  const ah=accolades.length?accolades.map(a=>{const d=ACCOLADE_DEFS.find(x=>x.id===a.id);return d?'<div class="accolade-item"><div class="accolade-icon">'+d.icon+'</div><div class="accolade-text"><div class="accolade-title">'+d.title+'</div><div class="accolade-desc">'+d.desc+'</div></div></div>':''}).join(''):'<div class="no-accolades">No accolades yet!</div>';
  document.getElementById('profile-box').innerHTML='<div style="display:flex;align-items:center;margin-bottom:14px"><div style="font-family:Lora,serif;font-size:.9rem;font-weight:500;color:var(--brown)">Profile</div><button class="btn-small" style="margin-left:auto;margin-right:6px" onclick="openProfile(\''+other+'\')">View '+displayName(other)+'</button><button class="btn-modal secondary" onclick="closeProfile()" style="padding:4px 10px;font-size:12px">Close</button></div><div class="profile-avatar-lg" style="background:'+bg+';color:'+ac+'">'+name[0]+'</div><div class="profile-name">'+name+'</div><div class="profile-sub">'+(user===currentUser?'your stats':'their stats')+'</div><div class="stats-grid"><div class="stat-card"><div class="stat-num" style="color:'+ac+'">'+stats.open+'</div><div class="stat-label">Open tasks</div></div><div class="stat-card"><div class="stat-num" style="color:'+ac+'">'+stats.week+'</div><div class="stat-label">Done this week</div></div><div class="stat-card"><div class="stat-num" style="color:'+ac+'">'+stats.total+'</div><div class="stat-label">Done overall</div></div><div class="stat-card" style="cursor:pointer" onclick="viewPastDue(\''+user+'\')"><div class="stat-num" style="color:var(--red)">'+stats.pastdue+'</div><div class="stat-label">Past due</div></div></div><div class="accolades-title">Accolades</div><div class="accolades-list">'+ah+'</div><div class="data-section"><div class="data-section-title">Data</div><div class="data-btns"><button class="btn-data" onclick="downloadData()">&#8595; Download backup</button><label class="btn-data upload-btn">&#8593; Upload backup<input type="file" accept=".json" onchange="uploadData(this)"></label>'+(user==='josh'?'<button class="btn-data" onclick="startFresh()" style="border-color:var(--red);color:var(--red)">&#x21ba; Start fresh</button>':'')+'</div></div>';
  document.getElementById('profile-overlay').style.display='flex';
}
function exportICS(id,bid){const t=findTodo(id,bid);if(!t||!t.deadline)return;const d=t.deadline.replace(/-/g,'');const title=encodeURIComponent(t.name);const details=encodeURIComponent(t.notes||'');const url='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+title+'&dates='+d+'/'+d+'&details='+details;window.open(url,'_blank');}
function closeProfile(){document.getElementById('profile-overlay').style.display='none';}
function startFresh(){if(!confirm('Are you sure? This will reset the to-do list.'))return;if(!confirm('Are you sure? Have you backed up the data?'))return;STATE={items:[],archive:[],accolades:{josh:[],sarah:[]},recipes:[],relationship:{active:[],archive:[]},promptsUsed:[],wishlist:[],notifications:[]};saveState();closeProfile();switchMainTab('todos');}
function viewPastDue(user){
  const items=[];
  STATE.items.filter(i=>!i.archived).forEach(i=>{if(i.type==='todo'&&!i.completed&&!isRepeatGreyed(i)&&isOverdue(i.deadline)&&(i.assignee===user||i.assignee==='both'))items.push({item:i,bid:''});else if(i.type==='bucket')(i.todos||[]).forEach(t=>{if(!t.completed&&!isRepeatGreyed(t)&&isOverdue(t.deadline)&&((t.assignee||i.assignee)===user||(t.assignee||i.assignee)==='both'))items.push({item:t,bid:i.id});});});
  if(!items.length){alert('No past due items!');return;}
  showModal('<div class="modal-title">Past Due</div><div style="display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto">'+items.map(({item,bid})=>'<div class="todo-card" style="cursor:pointer" onclick="closeModal();toggleExpand(\''+item.id+'\',\''+bid+'\');switchMainTab(\'todos\');switchTab(\'active\')"><div class="todo-row"><div class="todo-text-area"><div class="todo-name" style="color:var(--red)">'+esc(item.name)+'</div><div class="todo-deadline overdue">Due '+fmtDate(item.deadline)+'</div></div></div></div>').join('')+'</div><div class="modal-actions"><button class="btn-modal secondary" onclick="closeModal()">Close</button></div>');
}
function profileOverlayClose(e){if(e.target.id==='profile-overlay')closeProfile();}
function downloadData(){const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(JSON.stringify(STATE,null,2));a.download='ourlist-backup-'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);}
function uploadData(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const p=JSON.parse(e.target.result);if(!p.items||!Array.isArray(p.items))throw new Error('bad');if(!confirm('This will replace all current data with the backup. Continue?'))return;STATE=p;if(!STATE.accolades)STATE.accolades={josh:[],sarah:[]};if(!STATE.recipes)STATE.recipes=[];if(!STATE.relationship)STATE.relationship={active:[],archive:[]};if(!STATE.promptsUsed)STATE.promptsUsed=[];if(!STATE.wishlist)STATE.wishlist=[];if(!STATE.notifications)STATE.notifications=[];saveState();closeProfile();switchMainTab('todos');alert('Data restored successfully!');}catch(err){alert('Could not read file. Make sure it is a valid Our List backup (.json).');}};reader.readAsText(file);}

// ===================== STATS & ACCOLADES =====================
function getUserStats(user){
  const name=displayName(user);let open=0,week=0,total=0,pastdue=0;
  STATE.items.filter(i=>!i.archived).forEach(i=>{if(i.type==='todo'){if(!i.completed&&!isRepeatGreyed(i)&&(i.assignee===user||i.assignee==='both')){open++;if(isOverdue(i.deadline))pastdue++;}}else(i.todos||[]).forEach(t=>{if(!t.completed&&!isRepeatGreyed(t)&&((t.assignee||i.assignee)===user||(t.assignee||i.assignee)==='both')){open++;if(isOverdue(t.deadline))pastdue++;}});});
  const ws=thisWeekStart();
  buildFlatArchive().forEach(a=>{if(a.completedBy===name){total++;if(new Date(a.completedDate||0).getTime()>=ws)week++;}});
  return{open,week,total,pastdue};
}
const ACCOLADE_DEFS=[{id:'first_done',icon:'&#127807;',title:'First step!',desc:'Completed your first to-do.',check:(a,n)=>a.filter(x=>x.completedBy===n).length>=1},{id:'three_today',icon:'&#128293;',title:'On fire!',desc:'3 completed tasks in one day.',check:(a,n)=>a.filter(x=>x.completedBy===n&&x.completedDate===today()).length>=3},{id:'five_week',icon:'&#11088;',title:'Rock star!',desc:'5 tasks completed this week.',check:(a,n)=>a.filter(x=>x.completedBy===n&&new Date(x.completedDate||0).getTime()>=thisWeekStart()).length>=5},{id:'ten_total',icon:'&#127942;',title:'Double digits!',desc:'10 tasks completed overall.',check:(a,n)=>a.filter(x=>x.completedBy===n).length>=10},{id:'twenty_five',icon:'&#128142;',title:'Legend!',desc:'25 tasks completed overall.',check:(a,n)=>a.filter(x=>x.completedBy===n).length>=25},{id:'bucket_done',icon:'&#129524;',title:'Bucket champ!',desc:'Completed a full bucket.',check:(a,n)=>a.some(x=>x.type==='bucket'&&x.completedBy===n)}];
function checkAwardAccolades(user){if(!STATE.accolades)STATE.accolades={josh:[],sarah:[]};const flat=buildFlatArchive();let nw=[];ACCOLADE_DEFS.forEach(d=>{if(!STATE.accolades[user].find(a=>a.id===d.id)&&d.check(flat,displayName(user))){STATE.accolades[user].push({id:d.id,earnedAt:fmtNow()});nw.push(d);}});if(nw.length){saveState();confetti(80);setTimeout(()=>showAccoladeToast(nw[0]),300);}}
function buildFlatArchive(){const flat=[];STATE.archive.forEach(a=>{flat.push({...a});if(a.type==='bucket'&&a.original)(a.original.todos||[]).forEach(t=>{if(t.completed)flat.push({type:'todo',id:t.id,name:t.name,completedBy:t.completedBy,completedAt:t.completedAt,completedDate:t.completedDate});});});STATE.items.forEach(i=>{if(i.type==='todo'&&i.repeat&&i.completedBy)flat.push({type:'todo',id:i.id,name:i.name,completedBy:i.completedBy,completedAt:i.completedAt,completedDate:i.completedDate});if(i.type==='bucket')(i.todos||[]).forEach(t=>{if(t.repeat&&t.completedBy)flat.push({type:'todo',id:t.id,name:t.name,completedBy:t.completedBy,completedAt:t.completedAt,completedDate:t.completedDate});});});return flat;}
function showAccoladeToast(def){const el=document.createElement('div');el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--warm-white);border:1.5px solid var(--tan);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;z-index:9999;font-family:Nunito,sans-serif;animation:slideUp .4s ease';el.innerHTML='<span style="font-size:22px">'+def.icon+'</span><div><div style="font-weight:600;font-size:13px;color:var(--brown-dark)">'+def.title+'</div><div style="font-size:12px;color:var(--brown)">'+def.desc+'</div></div>';document.body.appendChild(el);setTimeout(()=>el.remove(),4000);}
function confetti(count){const colors=['#c06030','#7a5490','#4a7c59','#e8b84b','#d4555a','#5b8fcf'];for(let i=0;i<count;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.width=(7+Math.random()*7)+'px';el.style.height=(7+Math.random()*7)+'px';el.style.animationDuration=(1.5+Math.random()*2)+'s';el.style.animationDelay=(Math.random()*.8)+'s';el.style.borderRadius=Math.random()>.5?'50%':'2px';document.body.appendChild(el);setTimeout(()=>el.remove(),4000);}}

document.getElementById('pin-josh').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin('josh');});
document.getElementById('pin-sarah').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin('sarah');});
</script>
