<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our List</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Nunito:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#fdf6ee;--warm-white:#fff9f2;--tan:#e8d5bc;--tan-dark:#c9b49a;--brown:#7a5c44;--brown-dark:#3d2b1f;--josh:#c06030;--josh-light:#f5e6db;--sarah:#7a5490;--sarah-light:#ede0f5;--green:#4a7c59;--green-light:#dff0e6;--red:#b94040;--radius:12px;--repeat-done:#c8bfb5}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--brown-dark);display:flex;flex-direction:column}
.panel{display:none;flex-direction:column;height:100vh}.panel.active{display:flex}
#login-panel{align-items:center;justify-content:center;gap:20px;padding:24px;overflow-y:auto}
.app-title{font-family:'Lora',serif;font-size:2rem;font-weight:500;text-align:center}
.app-sub{font-size:13px;color:var(--brown);font-style:italic;text-align:center;margin-top:2px}
.login-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.login-card{background:var(--warm-white);border:1.5px solid var(--tan);border-radius:var(--radius);padding:24px 28px;text-align:center;min-width:158px}
.login-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;margin:0 auto 10px;font-family:'Lora',serif}
.login-card.josh .login-avatar{background:var(--josh-light);color:var(--josh)}.login-card.sarah .login-avatar{background:var(--sarah-light);color:var(--sarah)}
.login-name{font-size:15px;font-weight:600;font-family:'Lora',serif;margin-bottom:12px}
.pin-input{width:100%;padding:8px 10px;border:1.5px solid var(--tan);border-radius:8px;font-family:'Nunito',sans-serif;font-size:15px;background:var(--cream);text-align:center;letter-spacing:4px;color:var(--brown-dark)}
.pin-input:focus{outline:none;border-color:var(--tan-dark)}
.pin-btn{margin-top:8px;width:100%;padding:8px;border:none;border-radius:8px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.login-card.josh .pin-btn{background:var(--josh);color:#fff}.login-card.sarah .pin-btn{background:var(--sarah);color:#fff}
.pin-btn:hover{opacity:.85}.pin-hint{font-size:11px;color:var(--brown);margin-top:5px}
.login-error{color:var(--red);font-size:12px;margin-top:4px;min-height:15px}
#main-panel{overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1.5px solid var(--tan);flex-shrink:0;background:var(--warm-white)}
.topbar-title{font-family:'Lora',serif;font-size:1.1rem;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:7px}
.user-badge{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;transition:opacity .2s}
.user-badge:hover{opacity:.78}.user-badge.josh{background:var(--josh-light);color:var(--josh)}.user-badge.sarah{background:var(--sarah-light);color:var(--sarah)}
.user-dot{width:8px;height:8px;border-radius:50%}.user-badge.josh .user-dot{background:var(--josh)}.user-badge.sarah .user-dot{background:var(--sarah)}
.btn-icon{background:none;border:1.5px solid var(--tan);border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px;color:var(--brown);font-family:'Nunito',sans-serif;transition:all .2s}.btn-icon:hover{background:var(--tan)}
.tabs-bar{display:flex;gap:8px;padding:10px 16px 0;flex-shrink:0}
.tab{padding:6px 16px;border-radius:20px;border:1.5px solid var(--tan);background:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--brown);transition:all .2s}
.tab.active{background:var(--brown-dark);color:#fff;border-color:var(--brown-dark)}
.add-bar{display:flex;gap:8px;padding:8px 16px;flex-shrink:0;border-bottom:1px solid var(--tan)}
.btn-add{padding:6px 13px;border-radius:8px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-add.primary{background:var(--brown-dark);color:#fff}.btn-add.secondary{background:none;border:1.5px solid var(--tan-dark);color:var(--brown-dark)}.btn-add:hover{opacity:.82}
.scroll-area{flex:1;overflow-y:auto;padding:10px 16px}.items-list{display:flex;flex-direction:column;gap:9px}
.dragging{opacity:.35;border:2px dashed var(--tan-dark)!important}.drag-over{border-top:2px solid var(--josh)!important}
.bucket-card{background:var(--warm-white);border:1.5px solid var(--tan);border-radius:var(--radius);overflow:hidden;cursor:grab}.bucket-card:active{cursor:grabbing}
.bucket-header{display:flex;align-items:center;gap:7px;padding:10px 12px;cursor:pointer;transition:background .15s;user-select:none}.bucket-header:hover{background:#fdf0e4}
.bucket-chevron{font-size:11px;color:var(--brown);transition:transform .2s;flex-shrink:0}.bucket-card.open .bucket-chevron{transform:rotate(90deg)}
.bucket-title-area{flex:1;min-width:0}.bucket-name{font-family:'Lora',serif;font-size:13px;font-weight:500}.bucket-meta{font-size:11px;color:var(--brown);margin-top:1px}
.bucket-actions{display:flex;gap:4px;flex-shrink:0}
.btn-small{background:none;border:1px solid var(--tan-dark);border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--brown-dark);transition:all .2s;white-space:nowrap}
.btn-small:hover{background:var(--tan)}.btn-small.danger:hover{background:#fbdede;border-color:var(--red);color:var(--red)}
.bucket-items{padding:0 12px 8px;display:flex;flex-direction:column;gap:6px}
.bucket-add-row{padding:5px 12px 8px;border-top:1px dashed var(--tan)}
.btn-bucket-add{background:none;border:1px dashed var(--tan-dark);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--brown);width:100%;transition:background .2s}.btn-bucket-add:hover{background:var(--tan)}
.todo-card{background:var(--cream);border:1px solid var(--tan);border-radius:9px;overflow:hidden;cursor:grab}.todo-card:active{cursor:grabbing}
.todo-card.repeat-done{background:#f0ebe4;border-color:#d4c9bc}
.todo-row{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;transition:background .15s;user-select:none}.todo-row:hover{background:#fdf0e4}.todo-card.repeat-done .todo-row:hover{background:#ebe5dc}
.todo-check{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--tan-dark);background:var(--warm-white);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.todo-check.checked{background:var(--repeat-done);border-color:var(--repeat-done);color:#fff}.todo-check.checked.permanent{background:var(--green);border-color:var(--green)}
.todo-check-inner{font-size:10px;line-height:1}.todo-text-area{flex:1;min-width:0}
.todo-name{font-size:13px;font-weight:500}.todo-name.josh-color{color:var(--josh)}.todo-name.sarah-color{color:var(--sarah)}
.todo-name.completed{text-decoration:line-through;opacity:.45}.todo-name.repeat-greyed{color:var(--repeat-done)!important;text-decoration:line-through;opacity:.7}
.todo-deadline{font-size:11px;color:var(--brown);margin-top:1px}.todo-deadline.overdue{color:var(--red)}
.todo-right{display:flex;gap:4px;flex-shrink:0;align-items:center}
.assignee-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;white-space:nowrap}
.assignee-pill.josh{background:var(--josh-light);color:var(--josh)}.assignee-pill.sarah{background:var(--sarah-light);color:var(--sarah)}.assignee-pill.both{background:#f0eaf8;color:#6a4a80}
.repeat-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;background:#ede8e0;color:var(--brown);white-space:nowrap}
.todo-expand-area{padding:0 11px 9px;border-top:1px dashed var(--tan);font-size:13px;line-height:1.6}
.detail-label{font-size:10px;color:var(--brown);font-weight:600;margin-bottom:2px;margin-top:7px;text-transform:uppercase;letter-spacing:.4px}
.todo-expand-area a{color:var(--josh)}.linked-img{max-width:100%;max-height:180px;border-radius:8px;margin-top:5px;object-fit:cover;display:block}
.completed-stamp{font-size:11px;color:var(--green);margin-top:5px;font-style:italic}.repeat-stamp{font-size:11px;color:var(--brown);margin-top:5px;font-style:italic}
.archive-card{background:#f4f0eb;border:1px solid var(--tan);border-radius:9px;padding:9px 12px}
.archive-header{display:flex;align-items:flex-start;gap:8px}.archive-info{flex:1;min-width:0}
.archive-name{font-size:13px;text-decoration:line-through;color:var(--brown)}.archive-stamp{font-size:11px;color:var(--brown);margin-top:2px;font-style:italic}
.archive-todos{margin-top:8px;padding-top:6px;border-top:1px dashed var(--tan);display:flex;flex-direction:column;gap:4px}
.archive-todo-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--brown)}
.archive-todo-check{width:14px;height:14px;border-radius:4px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.archive-actions{display:flex;gap:5px;align-items:center;flex-shrink:0}
.btn-unarchive{background:none;border:1px solid var(--tan-dark);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--brown-dark);transition:all .2s}.btn-unarchive:hover{background:var(--green-light);border-color:var(--green);color:var(--green)}
.empty-state{text-align:center;padding:28px 20px;color:var(--brown);font-style:italic;font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(61,43,31,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--warm-white);border-radius:var(--radius);padding:20px;width:100%;max-width:440px;max-height:88vh;overflow-y:auto}
.modal-title{font-family:'Lora',serif;font-size:1rem;font-weight:500;margin-bottom:14px;color:var(--brown-dark)}
.field{margin-bottom:11px}.field label{display:block;font-size:11px;font-weight:600;color:var(--brown);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field textarea,.field select{width:100%;padding:7px 10px;border:1.5px solid var(--tan);border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;background:var(--cream);color:var(--brown-dark)}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--tan-dark)}.field textarea{min-height:65px;resize:vertical}.field .hint{font-size:11px;color:var(--brown);margin-top:2px}
.repeat-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;flex-wrap:wrap}
.repeat-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--brown-dark)}.repeat-toggle input[type=checkbox]{width:16px;height:16px;accent-color:var(--brown-dark);cursor:pointer}
.repeat-days-field{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--brown)}.repeat-days-field input{width:58px;padding:5px 8px;border:1.5px solid var(--tan);border-radius:7px;font-family:'Nunito',sans-serif;font-size:13px;background:var(--cream);color:var(--brown-dark);text-align:center}
.modal-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.btn-modal{padding:7px 16px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .2s}
.btn-modal.primary{background:var(--brown-dark);color:#fff}.btn-modal.secondary{background:none;border:1.5px solid var(--tan-dark);color:var(--brown-dark)}.btn-modal.danger{background:var(--red);color:#fff}.btn-modal:hover{opacity:.84}
.confirm-text{font-size:14px;margin-bottom:14px;line-height:1.5}.img-preview-box img{max-width:100%;max-height:110px;border-radius:8px;object-fit:cover;display:block;margin-top:5px}
.profile-overlay{position:fixed;inset:0;background:rgba(61,43,31,.45);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.profile-modal{background:var(--warm-white);border-radius:var(--radius);padding:22px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto}
.profile-avatar-lg{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:600;margin:0 auto 10px;font-family:'Lora',serif}
.profile-name{font-family:'Lora',serif;font-size:1.2rem;font-weight:500;text-align:center;margin-bottom:3px}.profile-sub{font-size:12px;color:var(--brown);text-align:center;font-style:italic;margin-bottom:16px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.stat-card{background:var(--cream);border:1px solid var(--tan);border-radius:9px;padding:10px 8px;text-align:center}.stat-num{font-size:22px;font-weight:600;font-family:'Lora',serif}.stat-label{font-size:10px;color:var(--brown);margin-top:2px;line-height:1.3}
.accolades-title{font-size:11px;font-weight:600;color:var(--brown);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.accolades-list{display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto;margin-bottom:4px}
.accolade-item{display:flex;align-items:center;gap:10px;background:var(--cream);border:1px solid var(--tan);border-radius:9px;padding:8px 10px}
.accolade-icon{font-size:20px;flex-shrink:0}.accolade-text{font-size:12px;line-height:1.4}.accolade-title{font-weight:600;color:var(--brown-dark)}.accolade-desc{color:var(--brown)}
.no-accolades{font-size:13px;color:var(--brown);font-style:italic;text-align:center;padding:10px 0}
.data-section{margin-top:16px;padding-top:14px;border-top:1.5px solid var(--tan)}.data-section-title{font-size:11px;font-weight:600;color:var(--brown);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.data-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-data{padding:7px 14px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--tan-dark);background:none;color:var(--brown-dark);transition:all .2s;display:flex;align-items:center;gap:5px}.btn-data:hover{background:var(--tan)}
.btn-data.upload-btn{position:relative;overflow:hidden}.btn-data.upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.confetti-piece{position:fixed;width:10px;height:10px;top:-10px;animation:fall linear forwards;z-index:9999;pointer-events:none;border-radius:2px}
@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div class="panel active" id="login-panel">
  <div style="font-size:30px;text-align:center;margin-bottom:4px">&#127968;</div>
  <div class="app-title">Our List</div>
  <div class="app-sub">a shared space for getting things done</div>
  <div class="login-cards">
    <div class="login-card josh"><div class="login-avatar">J</div><div class="login-name">Josh</div><input class="pin-input" type="password" maxlength="4" placeholder="PIN" id="pin-josh" autocomplete="off"><button class="pin-btn" onclick="doLogin('josh')">Sign in</button><div class="pin-hint"></div><div class="login-error" id="err-josh"></div></div>
    <div class="login-card sarah"><div class="login-avatar">S</div><div class="login-name">Sarah</div><input class="pin-input" type="password" maxlength="4" placeholder="PIN" id="pin-sarah" autocomplete="off"><button class="pin-btn" onclick="doLogin('sarah')">Sign in</button><div class="pin-hint"></div><div class="login-error" id="err-sarah"></div></div>
  </div>
</div>
<div class="panel" id="main-panel">
  <div class="topbar"><div class="topbar-title">&#127968; Our List</div><div class="topbar-right"><div class="user-badge" id="user-badge" onclick="openProfile(currentUser)"><div class="user-dot"></div><span id="user-label"></span> &#9660;</div><button class="btn-icon" onclick="doLogout()">Sign out</button></div></div>
  <div class="tabs-bar"><button class="tab active" id="tab-active" onclick="switchTab('active')">Active</button><button class="tab" id="tab-archive" onclick="switchTab('archive')">Archive</button></div>
  <div class="add-bar" id="add-bar"><button class="btn-add primary" onclick="openModal('todo','')">+ To-do</button><button class="btn-add secondary" onclick="openModal('bucket','')">+ Bucket</button></div>
  <div class="scroll-area"><div class="items-list" id="items-list"></div></div>
</div>
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="overlayClose(event)"><div class="modal" id="modal-box"></div></div>
<div class="profile-overlay" id="profile-overlay" style="display:none" onclick="profileOverlayClose(event)"><div class="profile-modal" id="profile-box"></div></div>
<script>
// Change PINs here:
const PINS={josh:'1234',sarah:'1234'};
const STORAGE_KEY='ourlist-v5';
let currentUser=null,currentTab='active',dragSrc=null;
let STATE={items:[],archive:[],accolades:{josh:[],sarah:[]}};
const SUPABASE_URL = 'https://ccfetfniolxzacsdxmyn.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_I2lY6zpxLYvn3qyebksRcg_vRPH8xfy';

async function loadState() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/ourlist_state?id=eq.shared&select=state`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      }
    });
    const rows = await res.json();
    if (rows && rows[0] && rows[0].state) return rows[0].state;
  } catch (e) { console.error('Load failed', e); }
  return { items: [], archive: [], accolades: { josh: [], sarah: [] } };
}

async function saveState() {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/ourlist_state?id=eq.shared`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ state: STATE, updated_at: new Date().toISOString() })
    });
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); } catch(e) {}
  } catch (e) { console.error('Save failed', e); }
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmtDate(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function isOverdue(d){if(!d)return false;return new Date(d+'T00:00:00')<new Date(new Date().toDateString());}
function fmtNow(){return new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});}
function today(){return new Date().toDateString();}
function thisWeekStart(){const d=new Date();d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);return d.getTime();}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function otherUser(){return currentUser==='josh'?'sarah':'josh';}
function displayName(u){return u==='josh'?'Josh':'Sarah';}
function isRepeatGreyed(t){if(!t.repeat||!t.repeatDays||!t.repeatDoneAt)return false;return Date.now()<new Date(t.repeatDoneAt).getTime()+(t.repeatDays*86400000);}
function assigneeLabel(a){if(!a||a==='both')return'<span class="assignee-pill both">Both</span>';return'<span class="assignee-pill '+a+'">'+displayName(a)+'</span>';}
function nameColor(assignee,creator){return((assignee&&assignee!=='both'?assignee:creator)==='josh')?'josh-color':'sarah-color';}
function showPanel(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
async function doLogin(user){const pin=document.getElementById('pin-'+user).value,err=document.getElementById('err-'+user);if(pin!==PINS[user]){err.textContent='Incorrect PIN';return;}err.textContent='';currentUser=user;STATE=await loadState();if(!STATE.accolades)STATE.accolades={josh:[],sarah:[]};document.getElementById('user-badge').className='user-badge '+user;document.getElementById('user-label').textContent=displayName(user);showPanel('main-panel');tickRepeats();switchTab('active');}
function doLogout(){currentUser=null;document.getElementById('pin-josh').value='';document.getElementById('pin-sarah').value='';showPanel('login-panel');}
function tickRepeats(){let c=false;STATE.items.forEach(i=>{if(i.type==='todo'&&i.repeat&&i.repeatDoneAt&&!isRepeatGreyed(i)){i.repeatDoneAt=null;i.completed=false;c=true;}if(i.type==='bucket')(i.todos||[]).forEach(t=>{if(t.repeat&&t.repeatDoneAt&&!isRepeatGreyed(t)){t.repeatDoneAt=null;t.completed=false;c=true;}});});if(c)saveState();}
function switchTab(tab){currentTab=tab;document.getElementById('tab-active').classList.toggle('active',tab==='active');document.getElementById('tab-archive').classList.toggle('active',tab==='archive');document.getElementById('add-bar').style.display=tab==='active'?'flex':'none';if(tab==='active')renderItems();else renderArchive();}
function renderItems(){const el=document.getElementById('items-list'),active=STATE.items.filter(i=>!i.archived);if(!active.length){el.innerHTML='<div class="empty-state">Nothing on the list yet!</div>';return;}el.innerHTML=active.map(i=>i.type==='bucket'?renderBucket(i):renderTodo(i,false,'')).join('');addDragListeners();}
function renderBucket(b){const todos=b.todos||[],done=todos.filter(t=>t.completed||isRepeatGreyed(t)).length,pct=todos.length?Math.round(done/todos.length*100):0,dl=b.deadline?' · Due '+fmtDate(b.deadline):'',nc=nameColor(b.assignee,b.creator);return'<div class="bucket-card'+(b.expanded?' open':'')+'" id="bkt-'+b.id+'" draggable="true" data-id="'+b.id+'" data-type="bucket"><div class="bucket-header" onclick="toggleBucket(\''+b.id+'\')"><span class="bucket-chevron">&#9654;</span><div class="bucket-title-area"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span class="bucket-name '+nc+'">'+esc(b.name)+'</span>'+assigneeLabel(b.assignee)+'</div><div class="bucket-meta">'+todos.length+' item'+(todos.length!==1?'s':'')+' · '+pct+'% done'+dl+'</div></div><div class="bucket-actions" onclick="event.stopPropagation()"><button class="btn-small" onclick="completeBucket(\''+b.id+'\')">&#10003; Done</button><button class="btn-small" onclick="openModal(\'editbucket\',\''+b.id+'\')">Edit</button><button class="btn-small danger" onclick="confirmDelete(\'bucket\',\''+b.id+'\',\'\')">Del</button></div></div>'+(b.expanded?'<div class="bucket-items">'+todos.map(t=>renderTodo(t,true,b.id)).join('')+(todos.length===0?'<div style="font-size:12px;color:var(--brown);font-style:italic;padding:3px 0">No items yet</div>':'')+'</div><div class="bucket-add-row"><button class="btn-bucket-add" onclick="openModal(\'todo\',\''+b.id+'\')">+ Add item to this bucket</button></div>':'')+'</div>';}
function renderTodo(t,inBucket,bucketId){const g=isRepeatGreyed(t),nc=nameColor(t.assignee,t.creator),ov=isOverdue(t.deadline)&&!t.completed&&!g?' overdue':'',dl=t.deadline?'Due '+fmtDate(t.deadline):'',bid=bucketId||'',drag=!inBucket?' draggable="true" data-id="'+t.id+'" data-type="todo"':'',cc='todo-card'+(g?' repeat-done':''),tn='todo-name '+nc+(g?' repeat-greyed':t.completed?' completed':''),ch='todo-check'+(g||t.completed?' checked':'')+(!t.repeat&&t.completed?' permanent':''),rp=t.repeat?'<span class="repeat-pill">&#8635; '+t.repeatDays+'d</span>':'';return'<div class="'+cc+'" id="todo-'+t.id+'"'+drag+'><div class="todo-row" onclick="toggleExpand(\''+t.id+'\',\''+bid+'\')"><div class="'+ch+'" onclick="event.stopPropagation();completeTodo(\''+t.id+'\',\''+bid+'\')">'+(g||t.completed?'<span class="todo-check-inner">&#10003;</span>':'')+'</div><div class="todo-text-area"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span class="'+tn+'">'+esc(t.name)+'</span>'+assigneeLabel(t.assignee)+rp+'</div>'+(dl?'<div class="todo-deadline'+ov+'">'+dl+'</div>':'')+'</div><div class="todo-right" onclick="event.stopPropagation()">(t.deadline&&!t.completed?'<button class="btn-small" onclick="exportICS(\''+t.id+'\',\''+bid+'\')">&#128197;</button>':'')+
'<button class="btn-small" onclick="openModal(\'edittodo\',\''+t.id+'\',\''+bid+'\')">Edit</button>'<button class="btn-small danger" onclick="confirmDelete(\'todo\',\''+t.id+'\',\''+bid+'\')">Del</button></div></div>'+(t.expanded?renderDetail(t,g):'')+'</div>';}
function renderDetail(t,g){let h='<div class="todo-expand-area">';if(t.notes)h+='<div class="detail-label">Notes</div><div>'+esc(t.notes).replace(/\n/g,'<br>')+'</div>';if(t.link)h+='<div class="detail-label">Link</div><a href="'+esc(t.link)+'" target="_blank">'+esc(t.link)+'</a>';if(t.imgUrl)h+='<div class="detail-label">Photo</div><img src="'+esc(t.imgUrl)+'" class="linked-img" onerror="this.style.display=\'none\'">';if(g&&t.repeatDoneAt){const ms=new Date(t.repeatDoneAt).getTime()+(t.repeatDays*86400000),diff=Math.max(0,Math.ceil((ms-Date.now())/3600000));h+='<div class="repeat-stamp">Resets in '+Math.floor(diff/24)+'d '+diff%24+'h</div>';}else if(!t.repeat&&t.completed&&t.completedBy)h+='<div class="completed-stamp">Completed by '+esc(t.completedBy)+' on '+esc(t.completedAt)+'</div>';h+='</div>';return h;}
function renderArchive(){const el=document.getElementById('items-list');if(!STATE.archive.length){el.innerHTML='<div class="empty-state">Nothing archived yet.</div>';return;}el.innerHTML=[...STATE.archive].reverse().map(a=>{let inner='<div class="archive-header"><div class="archive-info"><div class="archive-name">'+esc(a.name)+(a.type==='bucket'?' (bucket)':'')+'</div><div class="archive-stamp">Completed by '+esc(a.completedBy)+' &middot; '+esc(a.completedAt)+'</div></div><div class="archive-actions"><button class="btn-unarchive" onclick="unarchive(\''+a.id+'\')">&#8617; Restore</button></div></div>';if(a.type==='bucket'&&a.original&&(a.original.todos||[]).length)inner+='<div class="archive-todos">'+(a.original.todos||[]).map(t=>'<div class="archive-todo-item"><div class="archive-todo-check">&#10003;</div><span>'+esc(t.name)+'</span></div>').join('')+'</div>';return'<div class="archive-card">'+inner+'</div>';}).join('');}
function addDragListeners(){document.querySelectorAll('[draggable="true"]').forEach(el=>{el.addEventListener('dragstart',function(e){dragSrc=this;e.dataTransfer.effectAllowed='move';setTimeout(()=>this.classList.add('dragging'),0);});el.addEventListener('dragover',function(e){e.preventDefault();if(this!==dragSrc)this.classList.add('drag-over');});el.addEventListener('dragleave',function(){this.classList.remove('drag-over');});el.addEventListener('drop',function(e){e.preventDefault();this.classList.remove('drag-over');if(!dragSrc||dragSrc===this)return;const sId=dragSrc.dataset.id,dId=this.dataset.id,gS=STATE.items.findIndex(i=>i.id===sId),gD=STATE.items.findIndex(i=>i.id===dId);if(gS===-1||gD===-1)return;const[m]=STATE.items.splice(gS,1);STATE.items.splice(STATE.items.findIndex(i=>i.id===dId)+(gS<gD?1:0),0,m);saveState();renderItems();});el.addEventListener('dragend',function(){this.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(e=>e.classList.remove('drag-over'));dragSrc=null;});});}
function findTodo(id,bid){if(bid){const b=STATE.items.find(i=>i.id===bid);return b?(b.todos||[]).find(t=>t.id===id):null;}return STATE.items.find(i=>i.id===id&&i.type==='todo');}
function toggleBucket(id){const b=STATE.items.find(i=>i.id===id);if(b)b.expanded=!b.expanded;saveState();renderItems();}
function toggleExpand(id,bid){const t=findTodo(id,bid);if(t)t.expanded=!t.expanded;saveState();renderItems();}
function completeTodo(id,bid){const t=findTodo(id,bid);if(!t||isRepeatGreyed(t))return;t.completed=true;t.completedBy=displayName(currentUser);t.completedAt=fmtNow();t.completedDate=today();if(t.repeat){t.repeatDoneAt=new Date().toISOString();t.expanded=true;saveState();checkAwardAccolades(currentUser);renderItems();}else{t.expanded=true;if(!bid){STATE.archive.push({type:'todo',id:t.id,name:t.name,completedBy:t.completedBy,completedAt:t.completedAt,completedDate:t.completedDate,original:JSON.parse(JSON.stringify(t))});STATE.items=STATE.items.filter(i=>i.id!==id);}saveState();checkAwardAccolades(currentUser);renderItems();}}
function completeBucket(bid){const b=STATE.items.find(i=>i.id===bid);if(!b)return;if((b.todos||[]).length&&!(b.todos||[]).every(t=>t.completed||isRepeatGreyed(t))){alert('Please complete all items in this bucket first!');return;}STATE.archive.push({type:'bucket',id:b.id,name:b.name,completedBy:displayName(currentUser),completedAt:fmtNow(),completedDate:today(),original:JSON.parse(JSON.stringify(b))});STATE.items=STATE.items.filter(i=>i.id!==bid);saveState();confetti(60);checkAwardAccolades(currentUser);renderItems();}
function unarchive(id){const idx=STATE.archive.findIndex(a=>a.id===id);if(idx===-1)return;const a=STATE.archive.splice(idx,1)[0];if(a.original){const o=a.original;o.completed=false;o.completedBy=null;o.completedAt=null;o.repeatDoneAt=null;o.expanded=false;if(o.type==='bucket')(o.todos||[]).forEach(t=>{t.completed=false;t.completedBy=null;t.completedAt=null;t.repeatDoneAt=null;t.completedDate=null;});STATE.items.push(o);}else{STATE.items.push({id:a.id,type:a.type==='bucket'?'bucket':'todo',name:a.name,creator:currentUser,assignee:'both',completed:false,expanded:false,todos:[]});}saveState();renderArchive();}
function confirmDelete(type,id,bid){const name=type==='bucket'?(STATE.items.find(i=>i.id===id)||{}).name:(findTodo(id,bid)||{}).name;showModal('<div class="modal-title">Delete this item?</div><div class="confirm-text">Permanently delete <strong>'+esc(name||'this item')+'</strong>?</div><div class="modal-actions"><button class="btn-modal secondary" onclick="closeModal()">Cancel</button><button class="btn-modal danger" onclick="doDelete(\''+type+'\',\''+id+'\',\''+bid+'\')">Delete</button></div>');}
function doDelete(type,id,bid){if(type==='bucket')STATE.items=STATE.items.filter(i=>i.id!==id);else if(bid){const b=STATE.items.find(i=>i.id===bid);if(b)b.todos=(b.todos||[]).filter(t=>t.id!==id);}else STATE.items=STATE.items.filter(i=>i.id!==id);saveState();closeModal();if(currentTab==='active')renderItems();else renderArchive();}
function getUserStats(user){const name=displayName(user);let open=0,week=0,total=0,pastdue=0;STATE.items.filter(i=>!i.archived).forEach(i=>{if(i.type==='todo'){if(!i.completed&&!isRepeatGreyed(i)&&(i.assignee===user||i.assignee==='both')){open++;if(isOverdue(i.deadline))pastdue++;}}else(i.todos||[]).forEach(t=>{if(!t.completed&&!isRepeatGreyed(t)&&((t.assignee||i.assignee)===user||(t.assignee||i.assignee)==='both')){open++;if(isOverdue(t.deadline))pastdue++;}});});const ws=thisWeekStart();buildFlatArchive().forEach(a=>{if(a.completedBy===name){total++;if(new Date(a.completedDate||0).getTime()>=ws)week++;}});return{open,week,total,pastdue};}
const ACCOLADE_DEFS=[{id:'first_done',icon:'&#127807;',title:'First step!',desc:'Completed your first to-do.',check:(a,n)=>a.filter(x=>x.completedBy===n).length>=1},{id:'three_today',icon:'&#128293;',title:'On fire!',desc:'3 completed tasks in one day.',check:(a,n)=>a.filter(x=>x.completedBy===n&&x.completedDate===today()).length>=3},{id:'five_week',icon:'&#11088;',title:'Rock star!',desc:'5 tasks completed this week.',check:(a,n)=>a.filter(x=>x.completedBy===n&&new Date(x.completedDate||0).getTime()>=thisWeekStart()).length>=5},{id:'ten_total',icon:'&#127942;',title:'Double digits!',desc:'10 tasks completed overall.',check:(a,n)=>a.filter(x=>x.completedBy===n).length>=10},{id:'twenty_five',icon:'&#128142;',title:'Legend!',desc:'25 tasks completed overall.',check:(a,n)=>a.filter(x=>x.completedBy===n).length>=25},{id:'bucket_done',icon:'&#129524;',title:'Bucket champ!',desc:'Completed a full bucket.',check:(a,n)=>a.some(x=>x.type==='bucket'&&x.completedBy===n)}];
function checkAwardAccolades(user){if(!STATE.accolades)STATE.accolades={josh:[],sarah:[]};const flat=buildFlatArchive();let nw=[];ACCOLADE_DEFS.forEach(d=>{if(!STATE.accolades[user].find(a=>a.id===d.id)&&d.check(flat,displayName(user))){STATE.accolades[user].push({id:d.id,earnedAt:fmtNow()});nw.push(d);}});if(nw.length){saveState();confetti(80);setTimeout(()=>showAccoladeToast(nw[0]),300);}}
function buildFlatArchive(){const flat=[];STATE.archive.forEach(a=>{flat.push({...a});if(a.type==='bucket'&&a.original)(a.original.todos||[]).forEach(t=>{if(t.completed)flat.push({type:'todo',id:t.id,name:t.name,completedBy:t.completedBy,completedAt:t.completedAt,completedDate:t.completedDate});});});STATE.items.forEach(i=>{if(i.type==='todo'&&i.repeat&&i.completedBy)flat.push({type:'todo',id:i.id,name:i.name,completedBy:i.completedBy,completedAt:i.completedAt,completedDate:i.completedDate});if(i.type==='bucket')(i.todos||[]).forEach(t=>{if(t.repeat&&t.completedBy)flat.push({type:'todo',id:t.id,name:t.name,completedBy:t.completedBy,completedAt:t.completedAt,completedDate:t.completedDate});});});return flat;}
function showAccoladeToast(def){const el=document.createElement('div');el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--warm-white);border:1.5px solid var(--tan);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;z-index:9999;font-family:Nunito,sans-serif;animation:slideUp .4s ease';el.innerHTML='<span style="font-size:22px">'+def.icon+'</span><div><div style="font-weight:600;font-size:13px;color:var(--brown-dark)">'+def.title+'</div><div style="font-size:12px;color:var(--brown)">'+def.desc+'</div></div>';document.body.appendChild(el);setTimeout(()=>el.remove(),4000);}
function confetti(count){const colors=['#c06030','#7a5490','#4a7c59','#e8b84b','#d4555a','#5b8fcf'];for(let i=0;i<count;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.width=(7+Math.random()*7)+'px';el.style.height=(7+Math.random()*7)+'px';el.style.animationDuration=(1.5+Math.random()*2)+'s';el.style.animationDelay=(Math.random()*.8)+'s';el.style.borderRadius=Math.random()>.5?'50%':'2px';document.body.appendChild(el);setTimeout(()=>el.remove(),4000);}}
function openProfile(user){const name=displayName(user),stats=getUserStats(user),accolades=(STATE.accolades&&STATE.accolades[user])||[],other=user==='josh'?'sarah':'josh',bg=user==='josh'?'var(--josh-light)':'var(--sarah-light)',ac=user==='josh'?'var(--josh)':'var(--sarah)';const ah=accolades.length?accolades.map(a=>{const d=ACCOLADE_DEFS.find(x=>x.id===a.id);return d?'<div class="accolade-item"><div class="accolade-icon">'+d.icon+'</div><div class="accolade-text"><div class="accolade-title">'+d.title+'</div><div class="accolade-desc">'+d.desc+'</div></div></div>':''}).join(''):'<div class="no-accolades">No accolades yet!</div>';document.getElementById('profile-box').innerHTML='<div style="display:flex;align-items:center;margin-bottom:14px"><div style="font-family:Lora,serif;font-size:.9rem;font-weight:500;color:var(--brown)">Profile</div><button class="btn-small" style="margin-left:auto;margin-right:6px" onclick="openProfile(\''+other+'\')">View '+displayName(other)+'</button><button class="btn-modal secondary" onclick="closeProfile()" style="padding:4px 10px;font-size:12px">Close</button></div><div class="profile-avatar-lg" style="background:'+bg+';color:'+ac+'">'+name[0]+'</div><div class="profile-name">'+name+'</div><div class="profile-sub">'+(user===currentUser?'your stats':'their stats')+'</div>'<div class="stats-grid"><div class="stat-card"><div class="stat-num" style="color:'+ac+'">'+stats.open+'</div><div class="stat-label">Open tasks</div></div><div class="stat-card"><div class="stat-num" style="color:'+ac+'">'+stats.week+'</div><div class="stat-label">Done this week</div></div><div class="stat-card"><div class="stat-num" style="color:'+ac+'">'+stats.total+'</div><div class="stat-label">Done overall</div></div><div class="stat-card" style="cursor:pointer" onclick="viewPastDue(\''+user+'\')"><div class="stat-num" style="color:var(--red)">'+stats.pastdue+'</div><div class="stat-label">Past due</div></div></div>'<div class="accolades-title">Accolades</div><div class="accolades-list">'+ah+'</div><div class="data-section">'<div class="data-section-title">Data</div><div class="data-btns"><button class="btn-data" onclick="downloadData()">&#8595; Download backup</button><label class="btn-data upload-btn">&#8593; Upload backup<input type="file" accept=".json" onchange="uploadData(this)"></label>'+(user==='josh'?'<button class="btn-data danger" onclick="startFresh()" style="border-color:var(--red);color:var(--red)">&#x21ba; Start fresh</button>':'')+'</div></div>'';document.getElementById('profile-overlay').style.display='flex';}
function exportICS(id,bid){const t=findTodo(id,bid);if(!t||!t.deadline)return;const d=t.deadline.replace(/-/g,'');const title=encodeURIComponent(t.name);const notes=t.notes?'DESCRIPTION:'+t.notes+'\n':'';const blob=new Blob(['BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART;VALUE=DATE:'+d+'\nDTEND;VALUE=DATE:'+d+'\nSUMMARY:'+t.name+'\n'+notes+'END:VEVENT\nEND:VCALENDAR'],{type:'text/calendar'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=t.name.replace(/\s+/g,'_')+'.ics';document.body.appendChild(a);a.click();document.body.removeChild(a);}
function closeProfile(){document.getElementById('profile-overlay').style.display='none';}
function startFresh(){if(!confirm('Are you sure? This will reset the to-do list.'))return;if(!confirm('Are you sure? Have you backed up the data?'))return;STATE={items:[],archive:[],accolades:{josh:[],sarah:[]}};saveState();closeProfile();switchTab('active');}
function viewPastDue(user){const items=[];STATE.items.filter(i=>!i.archived).forEach(i=>{if(i.type==='todo'&&!i.completed&&!isRepeatGreyed(i)&&isOverdue(i.deadline)&&(i.assignee===user||i.assignee==='both'))items.push({item:i,bid:''});else if(i.type==='bucket')(i.todos||[]).forEach(t=>{if(!t.completed&&!isRepeatGreyed(t)&&isOverdue(t.deadline)&&((t.assignee||i.assignee)===user||(t.assignee||i.assignee)==='both'))items.push({item:t,bid:i.id});});});if(!items.length){alert('No past due items!');return;}showModal('<div class="modal-title">Past Due</div><div style="display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto">'+items.map(({item,bid})=>'<div class="todo-card" style="cursor:pointer" onclick="closeModal();toggleExpand(\''+item.id+'\',\''+bid+'\');switchTab(\'active\')"><div class="todo-row"><div class="todo-text-area"><div class="todo-name" style="color:var(--red)">'+esc(item.name)+'</div><div class="todo-deadline overdue">Due '+fmtDate(item.deadline)+'</div></div></div></div>').join('')+'</div><div class="modal-actions"><button class="btn-modal secondary" onclick="closeModal()">Close</button></div>');}
function profileOverlayClose(e){if(e.target.id==='profile-overlay')closeProfile();}
function downloadData(){const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(JSON.stringify(STATE,null,2));a.download='ourlist-backup-'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);}
function uploadData(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const p=JSON.parse(e.target.result);if(!p.items||!Array.isArray(p.items))throw new Error('bad');if(!confirm('This will replace all current data with the backup. Continue?'))return;STATE=p;if(!STATE.accolades)STATE.accolades={josh:[],sarah:[]};saveState();closeProfile();switchTab('active');alert('Data restored successfully!');}catch(err){alert('Could not read file. Make sure it is a valid Our List backup (.json).');}};reader.readAsText(file);}
function assigneeOptions(c){return[{val:currentUser,label:'Me ('+displayName(currentUser)+')'},{val:otherUser(),label:displayName(otherUser())},{val:'both',label:'Both of us'}].map(o=>'<option value="'+o.val+'"'+((c||currentUser)===o.val?' selected':'')+'>'+o.label+'</option>').join('');}
function repeatFields(t){const on=t&&t.repeat,days=t&&t.repeatDays?t.repeatDays:7;return'<div class="repeat-row"><label class="repeat-toggle"><input type="checkbox" id="f-repeat"'+(on?' checked':'')+' onchange="toggleRepeatField()"> Repeatable</label><div class="repeat-days-field" id="repeat-days-wrap" style="'+(on?'':'display:none')+'">Reset after <input type="number" id="f-repeat-days" min="1" max="365" value="'+days+'"> days</div></div>';}
function toggleRepeatField(){document.getElementById('repeat-days-wrap').style.display=document.getElementById('f-repeat').checked?'flex':'none';}
function getRepeatVals(){const on=document.getElementById('f-repeat')&&document.getElementById('f-repeat').checked;return{repeat:on,repeatDays:on?Math.max(1,parseInt(document.getElementById('f-repeat-days').value)||7):null};}
function openModal(type,arg1,arg2){if(type==='todo'){const inB=arg1&&STATE.items.find(i=>i.id===arg1);showModal('<div class="modal-title">'+(inB?'Add item to bucket':'New To-do')+'</div><div class="field"><label>Name *</label><input id="f-name" type="text" placeholder="What needs to be done?"></div><div class="field"><label>Assigned to</label><select id="f-assignee">'+assigneeOptions(currentUser)+'</select></div>'+repeatFields(null)+'<div class="field"><label>Deadline (optional)</label><input id="f-deadline" type="date"></div><div class="field"><label>Notes (optional)</label><textarea id="f-notes" placeholder="Add details..."></textarea></div><div class="field"><label>Link (optional)</label><input id="f-link" type="url" placeholder="https://..."></div><div class="field"><label>Image URL (optional)</label><input id="f-imgurl" type="url" placeholder="https://i.imgur.com/..." oninput="previewImg(this.value)"><div class="hint">Paste a direct image link</div><div class="img-preview-box" id="img-prev-box"></div></div><div class="modal-actions"><button class="btn-modal secondary" onclick="closeModal()">Cancel</button><button class="btn-modal primary" onclick="saveTodo(\''+(arg1||'')+'\')">Add</button></div>');}else if(type==='bucket'){showModal('<div class="modal-title">New Bucket</div><div class="field"><label>Bucket name *</label><input id="f-name" type="text" placeholder="e.g. Home Projects"></div><div class="field"><label>Assigned to</label><select id="f-assignee">'+assigneeOptions(currentUser)+'</select></div><div class="field"><label>Deadline (optional)</label><input id="f-deadline" type="date"></div><div class="modal-actions"><button class="btn-modal secondary" onclick="closeModal()">Cancel</button><button class="btn-modal primary" onclick="saveBucket()">Create</button></div>');}else if(type==='edittodo'){const t=findTodo(arg1,arg2||'');if(!t)return;showModal('<div class="modal-title">Edit To-do</div><div class="field"><label>Name *</label><input id="f-name" type="text" value="'+esc(t.name)+'"></div><div class="field"><label>Assigned to</label><select id="f-assignee">'+assigneeOptions(t.assignee)+'</select></div>'+repeatFields(t)+'<div class="field"><label>Deadline</label><input id="f-deadline" type="date" value="'+(t.deadline||'')+'"></div><div class="field"><label>Notes</label><textarea id="f-notes">'+esc(t.notes||'')+'</textarea></div><div class="field"><label>Link</label><input id="f-link" type="url" value="'+esc(t.link||'')+'"></div><div class="field"><label>Image URL</label><input id="f-imgurl" type="url" value="'+esc(t.imgUrl||'')+'" oninput="previewImg(this.value)"><div class="hint">Paste a direct image link</div><div class="img-preview-box" id="img-prev-box">'+(t.imgUrl?'<img src="'+esc(t.imgUrl)+'">':'')+'</div></div><div class="modal-actions"><button class="btn-modal secondary" onclick="closeModal()">Cancel</button><button class="btn-modal primary" onclick="updateTodo(\''+arg1+'\',\''+(arg2||'')+'\')">Save</button></div>');}else if(type==='editbucket'){const b=STATE.items.find(i=>i.id===arg1);if(!b)return;showModal('<div class="modal-title">Edit Bucket</div><div class="field"><label>Bucket name *</label><input id="f-name" type="text" value="'+esc(b.name)+'"></div><div class="field"><label>Assigned to</label><select id="f-assignee">'+assigneeOptions(b.assignee)+'</select></div><div class="field"><label>Deadline</label><input id="f-deadline" type="date" value="'+(b.deadline||'')+'"></div><div class="modal-actions"><button class="btn-modal secondary" onclick="closeModal()">Cancel</button><button class="btn-modal primary" onclick="updateBucket(\''+arg1+'\')">Save</button></div>');}}
function previewImg(url){const box=document.getElementById('img-prev-box');if(!box)return;box.innerHTML=url?'<img src="'+esc(url)+'" onerror="this.style.display=\'none\'">':'';}
function saveTodo(bid){const name=document.getElementById('f-name').value.trim();if(!name){alert('Please enter a name.');return;}const rv=getRepeatVals(),t={id:uid(),type:'todo',name,assignee:document.getElementById('f-assignee').value,repeat:rv.repeat,repeatDays:rv.repeatDays,repeatDoneAt:null,deadline:document.getElementById('f-deadline').value||null,notes:document.getElementById('f-notes').value.trim()||null,link:document.getElementById('f-link').value.trim()||null,imgUrl:document.getElementById('f-imgurl').value.trim()||null,creator:currentUser,completed:false,expanded:false};if(bid&&STATE.items.find(i=>i.id===bid)){const b=STATE.items.find(i=>i.id===bid);b.todos=b.todos||[];b.todos.push(t);}else STATE.items.push(t);saveState();closeModal();renderItems();}
function updateTodo(id,bid){const t=findTodo(id,bid);if(!t)return;const name=document.getElementById('f-name').value.trim();if(!name){alert('Please enter a name.');return;}const rv=getRepeatVals();Object.assign(t,{name,assignee:document.getElementById('f-assignee').value,repeat:rv.repeat,repeatDays:rv.repeatDays,deadline:document.getElementById('f-deadline').value||null,notes:document.getElementById('f-notes').value.trim()||null,link:document.getElementById('f-link').value.trim()||null,imgUrl:document.getElementById('f-imgurl').value.trim()||null});if(!rv.repeat){t.repeatDoneAt=null;t.completed=false;}saveState();closeModal();renderItems();}
function saveBucket(){const name=document.getElementById('f-name').value.trim();if(!name){alert('Please enter a name.');return;}STATE.items.push({id:uid(),type:'bucket',name,assignee:document.getElementById('f-assignee').value,deadline:document.getElementById('f-deadline').value||null,creator:currentUser,todos:[],expanded:true});saveState();closeModal();renderItems();}
function updateBucket(id){const b=STATE.items.find(i=>i.id===id);if(!b)return;const name=document.getElementById('f-name').value.trim();if(!name){alert('Please enter a name.');return;}b.name=name;b.assignee=document.getElementById('f-assignee').value;b.deadline=document.getElementById('f-deadline').value||null;saveState();closeModal();renderItems();}
function showModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-overlay').style.display='flex';}
function closeModal(){document.getElementById('modal-overlay').style.display='none';}
function overlayClose(e){if(e.target.id==='modal-overlay')closeModal();}
document.getElementById('pin-josh').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin('josh');});
document.getElementById('pin-sarah').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin('sarah');});
</script>
</body>
</html>
